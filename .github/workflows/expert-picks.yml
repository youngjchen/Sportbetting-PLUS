name: expert-picks

on:
  workflow_dispatch:
  schedule:
    # 每 30 分鐘一次（:03/:33 錯開其他爬蟲），但腳本自己決定本輪模式（見 expert_picks.js decideMode）：
    #  · full＝台灣 0/9/12/15/18/21 點：打榜單＋全聯盟＋今明兩天（00:03 吃 MLB 半夜貼單）
    #  · final＝有比賽 35~65 分鐘後開打：賽前終盤確認，只抓該聯盟今天、榜單用快取（吃臨場貼單/偷改單）
    #  · skip＝其他時段：對站方零請求
    # → 頻率高的是「檢查」不是「抓取」，禮貌與即時性兼顧。
    - cron: '3,33 * * * *'

concurrency:
  group: expert-picks
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: 抓找高手明牌
        run: node expert_picks.js
      - name: commit 結果
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/expert_picks.json
          if ! git diff --cached --quiet; then
            git commit -m "expert picks $(date -u +%FT%TZ)"
            if ! git push; then
              git pull --rebase --autostash || { git rebase --abort 2>/dev/null || true; }
              git push || true
            fi
          fi
