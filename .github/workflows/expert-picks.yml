name: expert-picks

on:
  workflow_dispatch:
  schedule:
    # 每 15 分鐘一次（GitHub cron 實測延遲 25~55 分＋大量丟檔，加密=買「有 tick 活著到場」的機會；
    # skip 檔對站方零請求）。腳本自決模式（見 expert_picks.js decideMode）：
    #  · full＝距上次 full ≥3 小時（不看鐘面→延遲免疫；約 8 輪/天，含 MLB 半夜檔）
    #  · final＝有比賽 25~70 分鐘後開打：賽前終盤確認（只該聯盟/只今天/榜單快取；40 分防重複）
    #  · skip＝其他：零請求
    - cron: '3,18,33,48 * * * *'

concurrency:
  group: expert-picks
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # 廢名額後 full=全量合格者(~660人×2頁)≈24-28分，放寬防殺
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: 抓找高手明牌
        run: node expert_picks.js
      - name: commit 結果
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/expert_picks.json
          if ! git diff --cached --quiet; then
            git commit -m "expert picks $(date -u +%FT%TZ)"
            if ! git push; then
              git pull --rebase --autostash || { git rebase --abort 2>/dev/null || true; }
              git push || true
            fi
          fi
