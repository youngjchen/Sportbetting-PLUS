name: expert-picks

on:
  workflow_dispatch:
  schedule:
    # 台灣 09:13~23:13 每小時一次（UTC 01~15；:13 錯開其他爬蟲的 :07/:23/:37）。
    # 高手多在賽前幾小時內貼單，白天每小時才跟得上；深夜(台灣 00~08)沒人貼單不空轉。
    # 每輪 ≈ 20 個榜單請求 + 最多 40人×4聯盟×2天 個人頁請求、1.0~1.6s 抖動間隔 —— 對站方保持溫和。
    - cron: '13 1-15 * * *'

concurrency:
  group: expert-picks
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: 抓找高手明牌
        run: node expert_picks.js
      - name: commit 結果
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/expert_picks.json
          if ! git diff --cached --quiet; then
            git commit -m "expert picks $(date -u +%FT%TZ)"
            if ! git push; then
              git pull --rebase --autostash || { git rebase --abort 2>/dev/null || true; }
              git push || true
            fi
          fi
