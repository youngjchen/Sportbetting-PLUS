# ?оёғоң…?пҡҷв…ЎйҡӨпҡЎ?1) repo Actions ??contents:write з”Ҳп“„? 2) йһҲиіўиҝӨ?оҝҷжҢҫ 3) ж’–йҳЎ? L ?оқ…йҷҚ?п„–?ж’Ңи„Ј?иқҜ?
name: liuyao-cast
on:
  schedule:
    - cron: '*/30 12-23 * * *'   # UTC 14:00??3:59 = ?е•Ј? 22:00??7:59еҡ—пҺҮй …?п•қ???MLB ?п• йӯҡ?пҡҷ????
    - cron: '*/30 0-4 * * *'     # UTC 00:00??4:59 = ?е•Ј? 08:00??2:59
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: liuyao-cast
  cancel-in-progress: false
jobs:
  cast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: |
          git config user.name "liuyao-bot"
          git config user.email "liuyao-bot@users.noreply.github.com"
      - run: node liuyao_cast_daily.js --commit
      - run: git pull --rebase && git push
