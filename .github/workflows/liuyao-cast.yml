# 六爻前瞻起卦守護工作流（divination-lab 實驗 L）— 由 liuyao_cast_daily.js 執行。
# 需求：1) repo Actions 需 contents:write 權限 2) 排程每 30 分一輪 3) 起卦結果 commit 進 ledger 公證時間戳。
name: liuyao-cast
on:
  schedule:
    - cron: '*/30 12-23 * * *'   # UTC 12:00–23:59 = 台北 20:00–07:59（涵蓋 MLB 開打前的起卦視窗）
    - cron: '*/30 0-4 * * *'     # UTC 00:00–04:59 = 台北 08:00–12:59
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: liuyao-cast
  cancel-in-progress: false
jobs:
  cast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: |
          git config user.name "liuyao-bot"
          git config user.email "liuyao-bot@users.noreply.github.com"
      - run: node liuyao_cast_daily.js --commit
      - run: git pull --rebase && git push
