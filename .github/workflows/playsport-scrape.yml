# ============================================================
#  模組 A：玩運彩賽前數據 + 即時比分 — 獨立工作流（自迴圈版）
#  · 與 Titan007 模組 B(scrape.yml)完全分開，互不影響。
#  · GitHub 的 schedule 不準、會被延遲/丟棄；故改用「自迴圈」：
#    cron 只負責把迴圈重新點起來，單次 run 自己跑 ~5h25m、每 5 分一輪。
#  · 每輪抓今天+明天，賽前累積 ERA/盤口、賽後抓即時比分→終場，
#    寫進 data/pregame_data.json 供 add-on 讀取融合。
# ============================================================
name: Playsport Pregame Scrape

on:
  workflow_dispatch:
  schedule:
    # 只為「重新點燃」迴圈用；錯開模組 B 的 7,37 降低撞車
    - cron: '15,45 * * * *'

permissions:
  contents: write

concurrency:
  group: playsport-pregame      # 同時間只跑一個迴圈
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350         # 自迴圈上限，安全落在 GitHub 360 分鐘硬上限內
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install axios cheerio

      - name: Scrape loop（每 5 分一輪，抓即時比分＋累積賽前資料）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          END=$(( SECONDS + 19500 ))          # 約 5h25m
          while [ "$SECONDS" -lt "$END" ]; do
            node playsport_scraper.js || true
            if [ -f pregame_data.json ]; then
              mkdir -p data
              cp -f pregame_data.json data/pregame_data.json
              git add data/pregame_data.json
              [ -f lottery_series.json ] && cp -f lottery_series.json data/lottery_series.json && git add data/lottery_series.json
              if ! git diff --cached --quiet; then
                git commit -m "chore: update pregame_data.json [skip ci]" || true
                git pull --rebase --autostash || true   # 與 B 共用 repo，先 rebase 再推
                git push || true
              fi
            fi
            sleep 300                           # 5 分鐘
          done
