# ============================================================
#  模組 A：玩運彩賽前數據 — 獨立工作流
#  · 與 Titan007 模組 B(scrape.yml)完全分開，互不影響。
#  · 賽前數據變慢，每 30 分鐘一次即可(cron 偶爾延遲對慢資料無妨)。
#  · 不需自迴圈(那是 B 為了 5 分鐘高頻才用的)。
#  · 不更動任何既有檔；輸出 data/pregame_data.json 供 add-on 讀取時融合。
# ============================================================
name: Playsport Pregame Scrape

on:
  schedule:
    - cron: '15,45 * * * *'    # 每 30 分；錯開整點，降低與 B 撞車機率
  workflow_dispatch:           # 也可手動觸發

permissions:
  contents: write

concurrency:
  group: playsport-pregame     # 同時間只跑一個，避免自我撞車
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 內聯安裝，不需動任何 package.json
      - name: Install deps
        run: npm install axios cheerio

      - name: Scrape Playsport
        run: node playsport_scraper.js

      - name: Commit pregame_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          cp -f pregame_data.json data/pregame_data.json
          git add data/pregame_data.json
          if git diff --cached --quiet -- data/pregame_data.json; then
            echo "無變化，不提交。"
            exit 0
          fi
          git commit -m "chore: update pregame_data.json [skip ci]"
          # 與 B 共用同一個 repo，推送前先 rebase 避免衝突
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push
