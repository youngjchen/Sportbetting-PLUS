name: nba-conn-test
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/nba-conn-test.yml']
permissions:
  contents: write
concurrency:
  group: nba-conn-test
  cancel-in-progress: false
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: probe nba endpoints
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const H = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126',
            'Referer': 'https://www.nba.com/',
            'Origin': 'https://www.nba.com',
            'Accept': 'application/json',
            'x-nba-stats-origin': 'stats',
            'x-nba-stats-token': 'true'
          };
          const targets = {
            cdn_scoreboard: 'https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json',
            cdn_schedule: 'https://cdn.nba.com/static/json/staticData/scheduleLeagueV2.json',
            stats_advanced: 'https://stats.nba.com/stats/leaguedashteamstats?Conference=&DateFrom=&DateTo=&Division=&GameScope=&GameSegment=&LastNGames=0&LeagueID=00&Location=&MeasureType=Advanced&Month=0&OpponentTeamID=0&Outcome=&PORound=0&PaceAdjust=N&PerMode=PerGame&Period=0&PlayerExperience=&PlayerPosition=&PlusMinus=N&Rank=N&Season=2025-26&SeasonSegment=&SeasonType=Regular%20Season&ShotClockRange=&StarterBench=&TeamID=0&TwoWay=0&VsConference=&VsDivision=',
            titan_month: 'https://nba.titan007.com/jsData/matchResult/25-26/l1_1_2025_11.js',
            titan_handicap: 'https://nba.titan007.com/odds/Handicap.aspx?ScheId=663562&companyId=8',
            playsport_result: 'https://www.playsport.cc/gamesData/result?allianceid=3&gametime=20260115'
          };
          (async () => {
            const out = { ranAt: new Date().toISOString(), results: {} };
            for (const [k, url] of Object.entries(targets)) {
              const c = new AbortController();
              const t = setTimeout(() => c.abort(), 25000);
              try {
                const hdr = k.startsWith('titan') ? { 'User-Agent': H['User-Agent'], 'Referer': 'https://nba.titan007.com/' } : H;
                const r = await fetch(url, { signal: c.signal, headers: hdr });
                const body = await r.text();
                out.results[k] = { status: r.status, bytes: body.length, ok: r.status === 200 && body.length > 100 };
              } catch (e) {
                out.results[k] = { status: 0, error: String(e && e.message || e), ok: false };
              } finally { clearTimeout(t); }
            }
            fs.writeFileSync('nba_conn_test.json', JSON.stringify(out, null, 2));
            console.log(JSON.stringify(out, null, 2));
          })();
          EOF
      - name: commit result
        run: |
          git config user.name "nba-conn-test-bot"
          git config user.email "actions@users.noreply.github.com"
          git add nba_conn_test.json
          git commit -m "nba connectivity test result" || echo "no changes"
          git pull --rebase origin main
          git push
