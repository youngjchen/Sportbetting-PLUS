## 四、`odds_log.json` 結構（已用真實檔確認）
```
{ lastUpdated, matches: { "<id>": {
  id, league:"mlb"|"npb"|"kbo"|"cpbl", time, startISO:"...+08:00",
  homeTeam, awayTeam,            // 對到排盤板繁中縮寫；對不上＝null
  homeTeamRaw, awayTeamRaw,      // Titan007 原始名
  firstSeen, lastUpdated,
  ml:{ bet365|"12bet"|bwin:{ open:{home,away}, live:[{ts,home,away}] } },  // 獨贏＝歐賠
  hd:{ bet365:[{home,line,away}] },    // 讓分；row[0]最新, 末列初盤
  ou:{ bet365:[{over,line,under}] }    // 大小；row[0]最新, 末列初盤
}}}
```
**格式關鍵（踩過坑）：**
- **獨贏 ml 是歐賠**（1.61/2.47，兩邊 >1），用 `impliedAway` 去水。
- **讓分/大小水位是「港盤」**：熱門邊 <1（0.49~0.9），冷門邊可 >1（到約 1.7）。**偵測：任一邊 <1 就當港盤，整列 +1 換歐賠再去水**。先前曾用「兩邊 ≤1.4」誤判，遇 `{0.59,1.45}` 會把 0.59 當歐賠算錯，**務必沿用 min<1**。
- `line` 是字串（可帶正負）；`home/away/over/under` 是數字。獨贏 `open` 首見記一次、`live` 價變才追加；讓分/大小留整張歷史（留比較長的那張）。
- `league` 是每場標記，排盤板靠它判聯盟（隊名沒對上時也認得出聯盟）。

