## 二、排盤板（index.html）架構

**核心資料模型：**
- `doc` 頂層：`boards`(按日期的對戰卡)、`games`(**獨立的已結算比賽陣列，所有回顧統計的唯一來源**，與 boards 完全獨立，刪 board 不影響 games)、各項設定。
- localStorage 鍵 `sportbetting_plus_doc_v2`；備份槽 `sportbetting_plus_autobackup`、`sportbetting_plus_lastbackup`。
- **game record 主要欄位**：`sid, date, league, awayTeam, homeTeam, awayScore, homeScore, hdFav, hdVal(實際讓分盤口), totVal(大小分基準), hdResult(fav_cover/fav_nocover), totResult, mlResult, lightsSnapshot{mlAway,mlHome,hdGive,hdRecv,over,under}, platformFlip, flipVanished(收盤前變一致), preGameSwap, flipOddsAway/Home(下注時賠率), openOddsAway/Home(初盤), closeOddsAway/Home(收盤), eraAway/eraHome(先發防禦率), trendTop, mlLitSide, lowCoverWarnHd/Ml/Tot`。
- **歷史匯入資料**另有 `totBasis` 欄位（1588 場帶基準線，3/26–6/1），早期匯入轉換器留下的。
- **match-card item 形狀**（boards 內，add-on 生卡也照這個）：`{id, type:"match", x, y, away, home, awayColor, homeColor, mlAway/mlHome:{lights}, hdFav:"home"|"away", hdVal:"", hdGive/hdRecv:{lights}, totVal:"", over/under:{lights}, +選配 flipOddsAway/Home, openOddsAway/Home, closeOddsAway/Home, eraAway/Home, platformFlip, flipVanished, preGameSwap, settled{...}, autoHdFlip(add-on 加的自動顛倒旗標)}`。卡片顏色＝聯盟色（兩隊同色）。

**關鍵函式：**
- 統計源：`collectPicks`(命中率，衝突場不計入)、`collectConflictGames`(byMarket 分盤口)、`collectFlipGames`、`collectDivergence`、`collectLowCoverWarning`。
- 數據判讀：`pythRead`(Pythagenpat 動態係數、期望勝率、虛實落差、一分差戰績)、`leagueHomeRate`(聯盟主場勝率即時算)、`log5Home`(Log5 對戰勝率＋主場修正)、`impliedAway`(賠率去水隱含勝率)、`eraAdjustedHome`(ERA 修正，每 1.00 ERA 差≈5pp，常數 `GAP_WARN=8`)、`recentResults`(最近 N 場勝負＋對手比分)。
- 渲染：`renderCard`、`renderReviewPage`、`fitTeamRow`(隊名自動縮字 16→11px)、`drillBlock`、`rvInfo`、`rvTugBar`、`_updFlipOddsCalc`(💰視窗即時判讀)、`_updSettleOddsCalc`(結算視窗即時判讀＋ERA驗證)、`autoFillFromScore`(比分自動判讓分/大小)。
- 版面：`relayoutPreservingState`(手動拖卡已停用，卡片靠列對齊排版，收合/展開需重排)。

**已知邊界 bug（未修，實務難觸發）**：若某天所有結算場全是衝突場，`collectPicks` 回空 → 回顧頁顯示「無資料」即使衝突統計有料。

