## 八、設計雷區（務必避免）
1. **【最重要】談定的參數絕不擅自更改，先問。** 我曾兩次把 `ACTIVE_WINDOW_HOURS` 從 24 擅自改 8，用戶很火。**24 是定案。**
2. **絕不提雞肋功能、不順著當下議題擠小功能。** 要通盤檢討提真正的體驗提升。
3. **絕不用「先觀察再做」當不做的藉口**(除非規格真未明)。
4. **不要一直新增開關**，要直接的行為改變。
5. **編輯精準**：曾多次誤刪相鄰函式；大段 `str_replace` 小心連帶刪除；**改完務必重新 view 再編輯**。
6. **不要重複造輪子或誤判已完成功能**——先查證程式碼現狀。
7. **手動拖卡已停用**(`startItemDrag` 直接 return)，位置靠 `relayoutPreservingState` 列對齊；**加卡後呼叫 autoLayout/relayout 是正常、非破壞**。
8. **顯示與判斷的四捨五入要一致**(曾出現「差8卻不觸發警報」的 7.x 邊界 bug，已統一先 round 再判斷)。
9. **不要過度反應小樣本**：多重比較下單一切片 p 值不可靠，要求累積足量再下定論。
10. **Token 敏感**：只交付**測過、正確**的程式，對真實資料驗證，不丟沒驗證的猜測；輸出精簡密度高。
11. **重寫前先拿用戶當前的檔**，別洗掉他手動的修改(金鶯別名、24h 是他自己改的)。
12. **回饋直接、不卑微、不過度道歉**；不對下注說教；用戶挫折咒罵時不要回罵，保持溫和專業。

