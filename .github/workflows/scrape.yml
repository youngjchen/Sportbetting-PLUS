## 九、技術注意事項（gotchas）
- **排盤板＝classic script**：全域共用，add-on 靠此包住 `renderCard`、讀寫全域(見 §三)。
- **港盤水位**：讓分/大小用 `devig()`、`min<1→港盤(+1)`；獨贏用 `impliedAway`(歐賠)。
- **分聯盟對照**：`mapTeam(raw, league)`，短名(巨人/樂天/阪神)因分聯盟可安全使用；把某聯盟隊名丟進別聯盟 scope 會回 null。
- **讓分盤翻面**(如 -1.5→1.5)會算出很大 pp(曾見 +26pp)＋原始數字同時顯示翻面，屬**正常/預期**(翻面＝最強方向訊號)。
- **未對應的隊(homeTeam=null)不會對到板上的卡**(`feedGameFor` 需兩隊皆非 null)，所以**不會在板上顯示錯誤**；補別名後才對到。(驗證腳本若繞過 `feedGameFor` 會看到「null」字樣，正常。)
- **手動拖卡停用** → 加卡後 `autoLayout()` 正常；自動排盤用 `snapshot()`＋`suppress=true` 包住 `autoLayout()` 讓多場只算一個復原步。
- **結算流程風險較高**(點六因此延後)。
- jsdom 測排盤板：localStorage 鍵 `sportbetting_plus_doc_v2`，需 `Object.defineProperty` 覆寫。

