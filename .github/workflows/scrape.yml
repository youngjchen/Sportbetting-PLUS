## 一、全貌：兩個元件 + 如何連接

1. **排盤板（`index.html`）** — 單檔 HTML、繁中、約 5,427 行、CSS/JS 全內聯、無外部依賴、部署 GitHub Pages（`youngjchen.github.io/Sportbetting-PLUS/`）。這是**手動排盤 / 結算 / 回顧 / 統計 / 模型**的大腦。
2. **自動賠率管線** — `index.js`(scraper, Node) + `scrape.yml`(Actions 排程) + `package.json`，每次跑把 Titan007 棒球盤口寫進 repo 的 `data/odds_log.json`。
3. **`odds-integration.js`(add-on)** — **橋**。載進 `index.html`(一行 `<script src>`)，讀 `odds_log.json`，在卡片上疊「📡 盤口動向」、提供「用賠率自動排盤」「🔄 更新賠率」。**非侵入**：不改排盤板任何一行，刪掉那行即復原。

**資料流**：Titan007 → scraper → `odds_log.json`(repo) → add-on 疊在排盤板卡片上 / 自動生卡 →（用戶手動結算）→ 排盤板 `doc.games[]`（統計來源）。目前 add-on 只負責「顯示賠率 + 生卡」；賠率**尚未**自動寫進結算紀錄（那是未完成的「點六」）。

