## 三、自動賠率管線架構

**scraper（`index.js`）：**
- 三市場：獨贏(12BET/Bet365/Bwin) / 讓分(Bet365) / 大小分(Bet365)。讓分與大小分**完整保留整張變動表**（每列＝一次盤口移動，row[0]=最新、末列=初盤）；獨贏無歷史，只有初盤＋當前，故「**價有變才追加**」自己縫軌跡。
- **四聯盟**：MLB(1) / 日職 NPB(2) / 韓職 KBO(17) / 中職 CPBL(5)。賽程檔網址 `…/matchResult/<年>/l<id>_1_<年>_<月>.js`。（代號由用戶從網站 network tab 查得，已確認。）
- **分聯盟隊名對照**：`LEAGUE_TEAMS = {mlb,npb,kbo,cpbl}`，`mapTeam(raw, league)` 只在該場聯盟內比對。解決「巨人」跨聯盟撞名（NPB＝讀賣巨人、MLB＝舊金山巨人、KBO＝樂天巨人/Lotte），「樂天」在日/韓/中各自對到 樂天金鷲/樂天巨人/樂天桃猿。
- 窗格 `ACTIVE_WINDOW_HOURS = 24`（**定案，見雷區**）；`cron */5`；每場標 `league`；未對應 log 附**聯盟＋對手**。
- MLB 別名**原樣保留用戶的修正**（金鶯＝`['金鶯','金莺','黃鸝','黄鹂']`，Titan007 用黃鸝指金鶯）。

**`scrape.yml`（自迴圈版，重要）**：**不靠 GitHub 排程「每 5 分鐘」**(它不準、會大量丟棄高頻排程)。改成：一個 job 跑約 **5h25m**、內部 `while` 迴圈**每 5 分鐘 `node index.js` + commit/pull --rebase/push**；`schedule: '7,37 * * * *'`(半小時一次、避開整點)只當「迴圈結束後重啟」的後援；`concurrency:{group, cancel-in-progress:false}` 確保同時只有一個迴圈、新觸發排隊接力 → **近乎不間斷的 5 分鐘輪詢**。`permissions: contents: write`(沒有會 push 403)；`timeout-minutes: 350`(上限 360)。`package.json` 只依賴 `axios`。**只因 repo 是 public(Actions 分鐘無限)才能這樣連續跑。**

**部署**：三檔放 repo → Settings→Actions→General→Workflow permissions 設 **Read and write** → Actions Run 一次 → 確認 `data/odds_log.json`。

**add-on（`odds-integration.js`）安裝（一行）**：放 repo 根目錄，在 `index.html` 的 `</body>` 正上方、原本大 `<script>` 之後加 `<script src="./odds-integration.js"></script>`。
**橋的運作機制（重要）**：排盤板是 **classic script**，頂層 `function`/`let`/`const` 都在共用全域 → 外部 classic script(add-on)能讀、且能**重新指派 `renderCard`**。add-on 就是包住 `renderCard`（先跑原本的，再把分析區塊塞進該卡 DOM、改 STAKE 那條），並讀寫這些全域：`doc, state, LEAGUES, render, renderCard, autoLayout, save, snapshot, uid, leagueOf, switchDate, closeMore, fmtDate, esc, impliedAway, suppress, world`。

