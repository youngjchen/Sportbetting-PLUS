  - **自動更新非干擾**：只在資料有變、沒開彈窗、沒在打字時重畫；手動則強制。collapsed 卡隱藏該區塊。
  - **港盤水位修正**(見 §四)：先前 MLB 讓分/大小評語算錯，已修。

