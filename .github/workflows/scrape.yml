## 七、用戶理念（務必內化）
1. **學習市場結構、識別誘盤(莊家陷阱)，非追求獲利。** 最看重「**受讓過盤率**」勝過獨贏勝率。主市場＝讓分，獨贏＝輔助，大小＝追蹤。
2. **讀市場訊號、避開該避的場**，而不是預測誰贏。
3. **討論先於動工。** 先完整理解需求、確認方案才寫 code。用戶會丟「不成熟的想法」要求一起討論——要**正面接住並給專業判斷**，不是照單全收、也不是打發。
4. **資訊要直白、低密度、可直接判讀。** 痛恨小字、雜訊、要「轉彎才懂」的呈現(例：堅持把「X 被買進 +Npp」改成「市場轉向看好 X」)。痛恨雞肋功能與堆砌的開關。
5. **數據必須精確、定義正確**(過盤率用結算時實際盤口非寫死、賠率比較須去水)。
6. **系統能做就現在做，絕不把工作量推給用戶**(叫他手記、截圖)。但**外部已免費且日更的資料不自建**(投手資料庫的結論)。
7. **以下注當下狀態為準**：顛倒/背離/對調的賽後變化不重新分類，但「曾變化」本身要標記累積。
8. **主要在 STAKE 下注、觀察 STAKE 的變化。** 抓的是 Titan007 軟盤(Bet365/12bet/bwin)當**參考訊號**，非下注處。Pinnacle 是 sharp 盤但在 Cloudflare 後抓不到，已接受用軟盤替代。顛倒場明牌以**台彩讓分方**為主，記錄時降級成獨贏燈(嚴格子集，寧低估不虛胖)。
9. **重視誠實方法論**：預測歸預測、驗證歸驗證；樣本不足明說、不過早下結論。
10. 跨電腦/手機，主要在電腦；手機限定功能可接受(懸停僅桌面)。

