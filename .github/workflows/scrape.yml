name: scrape-odds

on:
  workflow_dispatch:
  schedule:
    # GitHub 的 schedule 不準、會被大量延遲/丟棄（越高頻越會被降級），
    # 所以這裡【不靠它每 5 分鐘】，只把它當「迴圈結束後重啟」的後援。
    # 排密一點(半小時一次)、避開整點(整點 GitHub 負載最重 → 更容易被丟)。
    - cron: '7,37 * * * *'

# 同一時間只允許一個迴圈在跑；期間被觸發的新 run 會排隊(pending)，
# 等正在跑的迴圈結束後【立刻接手】→ 近乎不間斷的 5 分鐘輪詢。
concurrency:
  group: scrape-odds-loop
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 350            # 單一 job 上限 360 分；留餘裕避免被硬砍
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: 每 5 分鐘抓一次，本 run 持續約 5h25m 後結束，由排程接力
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          END=$(( SECONDS + 19500 ))          # 約 5h25m，安全落在 350 分鐘 timeout 內
          while [ "$SECONDS" -lt "$END" ]; do
            node index.js || true
            if [ -f data/odds_log.json ]; then
              git add data/odds_log.json
              if ! git diff --cached --quiet; then
                git commit -m "odds update $(date -u +%FT%TZ)" || true
                git pull --rebase --autostash || true
                git push || true
              fi
            fi
            sleep 300                           # 5 分鐘
          done
