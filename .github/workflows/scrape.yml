## 十、關鍵數據結論（截至 6/13，**務必傳達「仍偏小、多為雜訊」**）

> 註：這是**排盤板 `doc.games[]`** 的歷史結算資料結論，與「live 的 `odds_log.json`」是兩個不同資料集。

當前資料量：總 **1876 場**、帶燈快照 288、初+收成對 100、初+下注成對 62、顛倒 25(vanish 8)、有 ERA 11、app 結算有盤口 ~48。

**已驗證、可採信：**
- **大小分基準線無預測魔法**：1588 場歷史，|終場總分−基準| 平均 3.41、中位數 2.5；「只差0.5」僅 19.2%；大分 50.4%/小分 49.6%——莊家開線是切兩邊各半收水，非猜總分。用戶「準得誇張」的印象來自記憶偏誤。
- **市場越接近開賽越準**：收盤熱門命中 56% > 初盤 51%；收盤 Brier 0.2401 優於初盤 0.2441。實務：**能晚下就晚下**。
- **被買進方略佔優**：被買邊命中 57%(26/46)，大幅移動時 60%。方向對但未達確認門檻。

**有方向但需繼續累積：**
- **顛倒場是目前最強訊號**：台彩受讓方過盤約 **78%**(14/18)，p≈0.04 摸到顯著但多重比較下不夠硬。莊家意圖兩解釋(台彩開盤慢/向國際線收斂 vs 誘盤)**可操作結論相同**：顛倒窗口的台彩受讓方是錯價的一邊。vanish 標記累積後(兩組各 15 場)才能區分。**注意：用戶觀察的是 STAKE 變化，若動的常是 STAKE，解釋會倒過來(國際市場收到新資訊、台彩慢)。**
- **帶燈命中率**：全部約 50%、≥3 燈約 52%；大小分燈最差(約 36%，反指標等級，用戶很少下大小分)。
- **一分差戰績已可看**(如紅雀 12-6，是其「虛+6」標籤主因)。

**已明確否決、不要再提**：自建選手/投手資料庫(外部免費且日更)、NRFI/每局得分(屬投手市場、需從零建逐局管線)、畢氏與近況的主客拆分(每隊拆後僅~30場、雜訊內無意義，主客已併入 Log5 主場修正項)。

