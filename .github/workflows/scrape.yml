- **市場方向白話**：初盤→下注的去水機率變化，直接顯示「市場逐漸/大幅轉向看好 X」。
- **ERA 驗證警報**：模型vs盤口差距≥8時，結算視窗自動展開先發 ERA 輸入，用 ×5pp 換算修正，即時判「✓差距可由先發解釋—正常場」或「⚠先發無法解釋—建議避開」；卡片標四態(差N / 差N⚠ / 差N✓ / ⚠避開)；ERA 存紀錄供回測係數。

### 5b 賠率管線（本對話新建）
- **scraper**：多聯盟＋分聯盟對照＋league 標記＋附對手的未對應 log；Titan007 實際用字補齊(巨人=讀賣、金鷹、鬥山、TSG、羅德巨人、友利英雄…)。
- **add-on（整支新做）**：
  - 卡片「📡 盤口動向(自動)」：三市場**同一套 3 段方向評語**(`逐漸看好`≥1pp/`看好`≥2.5pp/`大幅轉向`≥4pp)＋**原始數字**。獨贏＝三家去水隱含勝率平均移動；讓分＝Bet365 水位去水移動(讓分方＝獨贏熱門)→「看好 X讓分/受讓 +X.Xpp · 盤±1.5」；大小＝大/小水位去水→「看好 大/小分 +X.Xpp · 基準8.5→9.0」。**「加深/縮小/上移/下移」已拿掉，改原始數字。**
