## 十二、運維注意（重要，解過用戶的困惑）
- **排盤板「🔄 更新賠率」≠ 跑 scraper。** 🔄 只是**重讀** `odds_log.json`；scraper 是 GitHub Actions 跑、與排盤板分開。
- **GitHub `schedule`(cron)根本不可靠：它會大量延遲/丟棄排程事件，越高頻越被降級丟棄。** 實測 `*/5` 被砍到一天只跑約 6 次(間隔數小時、近乎隨機)。**改 `*/10` 沒用——間隔值不是槓桿，GitHub 沒在理你的頻率。**
- **解法＝自迴圈 workflow(已部署，見 §三)**：一個 run 內部每 5 分鐘抓一次、跑 ~5.5 小時，由 `7,37` 排程＋concurrency 鎖接力重啟 → 近乎不間斷。免費(public repo)、無外部服務、無 token。**啟動方式：手動 Run workflow 一次把第一個迴圈點起來**(之後排程會自動接力)。
- **小殘留風險**：若 GitHub 連續 >5.5 小時都沒成功觸發排程，會有短暫空窗——再手動 Run 一次即可。若要更精準的定時，替代方案是外部 cron(如 cron-job.org)打 `repository_dispatch`，但需在外部服務存一支 GitHub PAT(多一個憑證、多一個依賴)。
- **怎麼判斷有沒有成功**：① Actions 分頁看 run 的時間與綠勾/紅叉(自迴圈版每個 run 會持續約 5.5 小時是正常的)；② 點開 repo 的 `data/odds_log.json` 看 `lastUpdated`；③ 排盤板 🔄 會顯示抓到的雲端時間("賠率已更新 …✓" / "雲端仍是 …未產新檔" / "抓取失敗")。
- **cron 不準可容忍的部分**：**讓分(主市場)與大小每次抓都拿 Bet365 整張變動史**，漏掉某些 tick 不丟歷史；只有獨贏(自己縫)軌跡會變粗。**但收盤線要靠「開賽前最後一次抓」**——這正是要近乎不間斷輪詢的主因(自迴圈版解決)。
- **GitHub Pages**：public repo＝免費無限 Actions 分鐘；commit 後約 1 分鐘 build 延遲。
- **【永久紅線】不做任何 Cloudflare/反爬蟲繞過**(Stake/Pinnacle 在 Cloudflare 後，抓不到也不碰)；Titan007 靜態站才抓。

