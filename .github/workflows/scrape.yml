name: scrape-odds

on:
  workflow_dispatch:
  schedule:
    # GitHub 的 schedule 不準、會被大量延遲/丟棄（越高頻越會被降級），
    # 所以這裡【不靠它每 5 分鐘】，只把它當「迴圈結束後重啟」的後援。
    # 多條錯開的排程 = 更多獨立「重啟機會」；GitHub 丟掉其中幾條時，仍有其他條能接力。
    # concurrency 保證同時只有一個迴圈在跑（多的觸發只會刷新那唯一的 pending 名額，不會疊跑），
    # 所以加密是安全的。避開整點(整點 GitHub 負載最重 → 更容易被丟)。
    # 修正 2026-07-04：原本只有 7,37 兩條、13:07→16:50 全被丟造成 3h43m 空窗、吞掉亞洲聯盟臨場盤口。
    - cron: '7,37 * * * *'
    - cron: '17,47 * * * *'
    - cron: '27,57 * * * *'

# 同一時間只允許一個迴圈在跑；期間被觸發的新 run 會排隊(pending)，
# 等正在跑的迴圈結束後【立刻接手】→ 近乎不間斷的 5 分鐘輪詢。
concurrency:
  group: scrape-odds-loop
  cancel-in-progress: false

permissions:
  contents: write
  actions: write        # 允許用 gh workflow run 自我重觸發（見最後一步）

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 350            # 單一 job 上限 360 分；留餘裕避免被硬砍
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: 每 5 分鐘抓一次，本 run 持續約 5h25m 後結束，由排程接力
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          END=$(( SECONDS + 19500 ))          # 約 5h25m，安全落在 350 分鐘 timeout 內
          while [ "$SECONDS" -lt "$END" ]; do
            # 每輪【先】同步到遠端最新，再抓：
            #  1) 中途 push 上 main 的程式碼修復/資料修補，本輪 5 分鐘內就生效（不用等下一個 run）；
            #  2) 清掉上一輪殘留的 rebase/衝突狀態。
            # 2026-07-17 實測教訓：舊版「commit 完才 pull --rebase」，撞到手動 push 的
            # odds_log 資料修補 → rebase 衝突、|| true 吞掉 → worktree 從此卡在衝突狀態，
            # 之後每輪 loadLog 解析失敗改寫全新檔、push 全部靜默失敗，賠率停更直到本輪結束。
            git rebase --abort 2>/dev/null || true
            git fetch origin main || true
            git reset --hard origin/main || true
            node index.js || true
            if [ -f data/odds_log.json ]; then
              git add data/odds_log.json
              [ -f data/intl_state.json ] && git add data/intl_state.json
              if ! git diff --cached --quiet; then
                git commit -m "odds update $(date -u +%FT%TZ)" || true
                # push 失敗多半是同分鐘別的 workflow 推了其它檔（pregame 等）→ rebase 一次再推；
                # 再不行就放掉，下一輪 reset --hard 會以遠端最新重來（只損失一個 5 分鐘樣本）。
                if ! git push; then
                  git pull --rebase --autostash || { git rebase --abort 2>/dev/null || true; }
                  git push || true
                fi
              fi
            fi
            sleep 300                           # 5 分鐘
          done
      - name: 自我重觸發下一輪（cron 被丟時的後援；需設 WORKFLOW_PAT secret 才啟用）
        if: always()
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          # 為什麼：GitHub 的 schedule 會被整批丟棄（2026-07-04 就 13:07→16:50 全丟、3h43m 空窗）。
          # 迴圈正常跑完(~5h25m)後主動排入下一輪，就不必只靠可能被丟的 cron。
          # concurrency 群組保證同時只有一個迴圈在跑 → 這個 dispatch 只會成為唯一 pending、
          # 待本輪結束後無縫接手，不會疊跑、不會失控。GITHUB_TOKEN 無法觸發 workflow → 必須用 PAT。
          if [ -z "$GH_TOKEN" ]; then
            echo "ℹ️ 未設定 WORKFLOW_PAT secret → 略過自我重觸發（仍靠 schedule cron 接力，行為同舊版）"
            exit 0
          fi
          gh workflow run scrape.yml -R "${{ github.repository }}" \
            && echo "✅ 已排入下一輪（不受 GitHub schedule 丟包影響）" \
            || echo "⚠️ 自我重觸發失敗（PAT 權限不足？）— 仍有 cron 後援，不影響本輪"
