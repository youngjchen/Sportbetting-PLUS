## 〇、開場提醒（動工前必做，別跳過）

**動手前先請用戶上傳當前檔案、`view` 程式碼、用真實資料重算/煙霧測試，確認現狀再動。** 切勿空口回答或假設功能未完成——本專案已歷經多輪深度迭代，多數「直覺上該加」的功能早已存在。

**驗證流程（每次交付前必做）：**

*排盤板（index.html）：*
1. 抽出 `<script>` → `node --check` 確認語法。
2. 用 **jsdom**（非 puppeteer，環境裝不了 Chromium）載入真實備份做 headless 煙霧測試。關鍵：localStorage 鍵名 `sportbetting_plus_doc_v2`，需用 `Object.defineProperty(window,'localStorage',{value:...,configurable:true})` 覆寫（直接賦值無效）。實測開結算視窗、回顧頁、統計頁、各篩選，確認零 error。
3. 用 **Python 獨立重算統計值**，與頁面渲染值交叉比對。
4. 無誤才 `cp` 到 `/mnt/user-data/outputs/index.html` 並 present。

*賠率管線（index.js / odds-integration.js）：*
1. `node --check` 兩支。
2. 把 add-on 的分析函式（`mlSentiment / hdSentiment / ouSentiment / feedFavTeam / devig`）對**用戶上傳的真實 `odds_log.json`** 跑一遍（IIFE 會碰 `document`，測試時要 stub `window/document/setInterval/fetch`；它有 `module.exports`）。
3. 用 `mapTeam(raw, league)` 對真實檔所有 raw 名跑一次，確認 **0 未對應**。
4. 無誤才 `cp` 到 outputs 並 present。

