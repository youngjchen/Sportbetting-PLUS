<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NBA 排盤板</title>
<!-- 階段3 骨架版（NBA_PLAN.md T14-T15 起手）。資料管線(nba-scrape/官方比分)於階段2上線後接入;
     localStorage 命名空間 sportbetting_nba_doc_v1（與棒球板 sportbetting_plus_doc_v2 完全隔離）。-->
<style>
  :root{
    --bg:#0a0e17; --card:#101828; --card2:#0d1420; --line:#1e2a40;
    --ink:#e8edf6; --ink-dim:#8a94a8; --lit:#ffb02e; --grn:#35d07f; --red:#ff5d5d;
    --blu:#3aa0ff; --org:#ff9d3c; --nba:#e56020;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",system-ui,sans-serif;min-height:100vh}
  header{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--card2);position:sticky;top:0;z-index:5}
  .logo{font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px}
  .logo .dot{width:12px;height:12px;border-radius:50%;background:var(--nba)}
  .swpill{display:inline-flex;align-items:center;gap:5px;margin:0 4px;padding:4px 12px;border:1px solid var(--line);border-radius:999px;font-size:13px;font-weight:700;color:var(--ink-dim);text-decoration:none;white-space:nowrap}
  .lgchip{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border:1px solid var(--line);border-radius:10px;background:var(--card);font-size:14px;font-weight:700}
  .lgchip .lgdot{width:8px;height:8px;border-radius:50%;background:var(--nba)}
  .stamp{margin-left:auto;color:var(--ink-dim);font-size:12.5px}
  .datebar{display:flex;gap:8px;align-items:center;padding:10px 18px;border-bottom:1px solid var(--line);overflow-x:auto}
  .datebar .lab{color:var(--ink-dim);font-size:13px;margin-right:4px}
  .dbtn{padding:5px 12px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink);font-size:13.5px;font-weight:700;cursor:pointer;white-space:nowrap}
  .dbtn.on{background:var(--lit);color:#151006;border-color:var(--lit)}
  main{display:flex;flex-direction:column;align-items:center;gap:16px;padding:22px 16px 60px}
  .empty{max-width:640px;text-align:center;color:var(--ink-dim);font-size:14px;line-height:2;border:1px dashed var(--line);border-radius:14px;padding:26px 22px}
  .empty b{color:var(--ink)}
  /* 卡片（DEMO v2 定稿樣式） */
  .card{width:660px;max-width:100%;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .chead{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--card2);border-bottom:1px solid var(--line)}
  .chead .t{font-size:15px;color:var(--ink-dim);letter-spacing:.5px}
  .badge{font-size:12.5px;font-weight:700;padding:3px 10px;border-radius:999px;border:1px solid}
  .b-live{color:var(--grn);border-color:var(--grn);background:rgba(53,208,127,.08)}
  .b-move{color:var(--org);border-color:var(--org);background:rgba(255,157,60,.08)}
  .b-note{color:var(--ink-dim);border-color:var(--line)}
  .spacer{flex:1}
  .banner{display:flex;gap:10px;align-items:center;padding:9px 16px;font-size:13.5px;background:rgba(255,157,60,.07);border-bottom:1px solid var(--line);color:var(--org)}
  .cbody{display:grid;grid-template-columns:218px 1fr}
  .score{border-right:1px solid var(--line);padding:14px 12px;display:flex;flex-direction:column;gap:6px}
  .qs{width:100%;border-collapse:collapse;font-size:12.5px;text-align:center;color:var(--ink-dim)}
  .qs th{font-weight:400;color:#5c6678;padding:2px 0}
  .qs td{padding:3px 0}
  .qs .liveq{color:var(--grn);font-weight:700}
  .qs.mid{margin:6px 0;border-top:1px dashed var(--line);border-bottom:1px dashed var(--line);padding:4px 0}
  .qs .side{color:var(--ink-dim);font-size:12px;text-align:left;padding-left:2px}
  .tmblk{display:flex;flex-direction:column;gap:3px}
  .bigsc{font-size:42px;font-weight:800;color:var(--lit);line-height:1.05;font-variant-numeric:tabular-nums}
  .tmnm{font-size:18.5px;font-weight:700}
  .pcts{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-dim);padding:2px 2px}
  .pcts b{color:var(--ink);font-weight:600}
  .coldtag{font-size:11px;color:var(--ink-dim);border:1px dashed var(--line);border-radius:6px;padding:1px 6px}
  .inj{margin-top:auto;font-size:12px;color:var(--ink-dim);line-height:1.6;border-top:1px dashed var(--line);padding-top:8px}
  .inj .q{color:var(--lit)} .inj .o{color:var(--red)}
  .ana{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
  .mkt-title{display:flex;align-items:center;gap:8px;font-size:14.5px;font-weight:700}
  .mkt-title .odds{margin-left:auto;font-size:12.5px;color:var(--ink-dim);font-weight:400}
  .mkt-title .odds b{color:var(--grn);font-weight:600}
  .row{display:grid;grid-template-columns:34px 128px 1fr 30px 52px;align-items:center;gap:8px;font-size:15px}
  .tag{width:30px;height:22px;border-radius:5px;background:var(--lit);color:#151006;font-weight:800;font-size:12.5px;display:flex;align-items:center;justify-content:center}
  .tag.mut{background:#26314b;color:var(--ink-dim)}
  .nm{font-weight:700;white-space:nowrap}
  .nm .ln{color:var(--lit);font-weight:800;margin-left:6px}
  .lights{display:flex;gap:6px;justify-content:flex-end}
  .dot2{width:17px;height:17px;border-radius:50%;border:2px solid #3a4763}
  .dot2.on{background:var(--lit);border-color:var(--lit)}
  .betchip{width:24px;height:22px;border:1.5px dashed #3a4763;border-radius:5px;color:var(--ink-dim);font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .betchip.on{border-style:solid;border-color:var(--lit);color:var(--lit);background:rgba(255,176,46,.12);box-shadow:0 0 8px rgba(255,176,46,.35)}
  .pct{text-align:right;font-weight:700;font-size:15.5px}
  .pct.g{color:var(--grn)}
  .strip{display:flex;gap:8px;align-items:center;background:rgba(58,160,255,.07);border:1px solid rgba(58,160,255,.25);border-radius:8px;padding:7px 12px;font-size:13px;color:var(--blu)}
  .hr{border-top:1px solid var(--line)}
  .basein{width:64px;background:var(--card2);border:1px solid var(--line);border-radius:7px;color:var(--ink);font-size:14.5px;font-weight:700;text-align:center;padding:3px 4px}
  .cmt{font-size:12.5px;color:var(--ink-dim);padding-left:42px}
  .cmt b{color:var(--org)}
  .demoTag{font-size:11px;color:#151006;background:var(--org);border-radius:6px;padding:1px 8px;font-weight:800}
</style>
</head>
<body>
  <header>
    <div class="logo"><span class="dot"></span>NBA 排盤板</div>
    <a class="swpill" href="index.html" title="切換回棒球排盤板">⚾ 棒球</a>
    <span class="lgchip"><span class="lgdot"></span>NBA</span>
    <span class="stamp" id="stamp">骨架版 · 資料管線 2026-09 接入</span>
  </header>
  <div class="datebar" id="datebar"><span class="lab">日期</span></div>
  <main id="board"></main>

<script>
"use strict";
// ===== 文檔（與棒球板完全隔離的命名空間）=====
const DOC_KEY = "sportbetting_nba_doc_v1";
function loadDoc(){ try{ return JSON.parse(localStorage.getItem(DOC_KEY)) || null; }catch(e){ return null; } }
function saveDoc(d){ localStorage.setItem(DOC_KEY, JSON.stringify(d)); }
let doc = loadDoc() || { v:1, activeDate: today(), boards:{} };
function today(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
const esc = (s)=> String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// ===== 資料管線掛鉤（階段2 上線後實作;見 nba_lab/NBA_PLAN.md T10-T12,T17）=====
// TODO(T10): loadOdds()  → data/nba_odds_log.json（bet365 變盤序列）
// TODO(T11): loadLottery() → data/nba_lottery_series.json（台彩序列）
// TODO(T12): loadPregame() → 先發/傷兵（玩運彩賽前頁,臨場 1h 加密輪詢）
// TODO(T17): loadLive()  → cdn.nba.com scoreboard（節數+時鐘+OT;±120分跨日配對防呆）
// TODO(T19): 模型% = nba_lab 評分引擎輸出（垃圾時間過濾版+陣容先驗;前15場標「先驗」）

// ===== 日期列 =====
function renderDates(){
  const bar = document.getElementById("datebar");
  bar.querySelectorAll(".dbtn").forEach(b=>b.remove());
  const dates = Object.keys(doc.boards).sort();
  if(!dates.includes(doc.activeDate)) dates.push(doc.activeDate);
  for(const d of dates.sort()){
    const b=document.createElement("button"); b.className="dbtn"+(d===doc.activeDate?" on":"");
    b.textContent=d.slice(5).replace("-","/");
    b.onclick=()=>{ doc.activeDate=d; saveDoc(doc); render(); };
    bar.appendChild(b);
  }
}

// ===== 卡片渲染（DEMO v2 定稿版型）=====
function lightsHTML(n){ let h=""; for(let i=0;i<5;i++) h+=`<span class="dot2${i<(n||0)?" on":""}"></span>`; return `<span class="lights">${h}</span>`; }
function renderCard(g){
  const card=document.createElement("div"); card.className="card";
  const live=g.status==="live", fin=g.status==="final";
  const qcells=(arr)=> (arr||[]).map((v,i)=>`<td class="${live&&i===(g.curQ-1)?"liveq":""}">${v==null?"–":v}</td>`).join("");
  card.innerHTML = `
    <div class="chead">
      <span class="t">${esc(g.time||"")}</span>
      ${live?`<span class="badge b-live">● Q${g.curQ} ${esc(g.clock||"")}</span>`:""}
      ${fin?`<span class="badge b-live">已終場</span>`:""}
      <span class="spacer"></span>
      ${g.lineMove?`<span class="badge b-move">⚡ 線移 ${g.lineMove}</span>`:""}
      ${g.coldStart?`<span class="badge b-note">樣本不足 ${esc(g.coldStart)}</span>`:""}
      ${g.demo?`<span class="demoTag">示意</span>`:""}
    </div>
    ${g.moveBanner?`<div class="banner">⚡ ${esc(g.moveBanner)}</div>`:""}
    <div class="cbody">
      <div class="score">
        <div class="tmblk">
          <div class="bigsc">${g.awayScore!=null?g.awayScore:""}</div>
          <div class="tmnm">${esc(g.away)}</div>
          <div class="pcts"><span>模型 <b>${g.mAway!=null?g.mAway+"%":"–"}</b></span><span>盤口 <b>${g.oAway!=null?g.oAway+"%":"–"}</b></span></div>
        </div>
        <table class="qs mid">
          <tr><th></th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th>${(g.qAway||[]).length>4?"<th>OT</th>":""}</tr>
          <tr><td class="side">客</td>${qcells(g.qAway)}</tr>
          <tr><td class="side">主</td>${qcells(g.qHome)}</tr>
        </table>
        <div class="tmblk">
          <div class="pcts"><span>模型 <b>${g.mHome!=null?g.mHome+"%":"–"}</b>${g.prior?` <span class="coldtag">先驗</span>`:""}</span><span>盤口 <b>${g.oHome!=null?g.oHome+"%":"–"}</b></span></div>
          <div class="tmnm">${esc(g.home)}</div>
          <div class="bigsc">${g.homeScore!=null?g.homeScore:""}</div>
        </div>
        ${(g.injAway||g.injHome)?`<div class="inj">傷停｜${esc(g.away)}：${g.injAway||"—"}<br>　　　${esc(g.home)}：${g.injHome||"—"}</div>`:""}
      </div>
      <div class="ana">
        <div class="mkt-title">獨贏 <span class="odds">賠率 <b>${esc(g.mlTrend||"—")}</b></span></div>
        <div class="row"><span class="tag mut">客</span><span class="nm">${esc(g.away)}</span>${lightsHTML(g.L&&g.L.mlAway)}<span class="betchip">注</span><span class="pct">${g.covMlAway!=null?g.covMlAway+"%":"–"}</span></div>
        <div class="row"><span class="tag mut">主</span><span class="nm">${esc(g.home)}</span>${lightsHTML(g.L&&g.L.mlHome)}<span class="betchip">注</span><span class="pct g">${g.covMlHome!=null?g.covMlHome+"%":"–"}</span></div>
        <div class="hr"></div>
        <div class="mkt-title">讓分 <span class="odds">賠率 <b>${esc(g.hdTrend||"—")}</b></span></div>
        <div class="row"><span class="tag">讓</span><span class="nm">${esc(g.hdFavName||"")}<span class="ln">${g.hdLine!=null?(g.hdLine>0?"+":"")+(-Math.abs(g.hdLine)):""}</span></span>${lightsHTML(g.L&&g.L.hdGive)}<span class="betchip">注</span><span class="pct g">${g.covGive!=null?g.covGive+"%":"–"}</span></div>
        <div class="row"><span class="tag mut">受讓</span><span class="nm">${esc(g.hdDogName||"")}<span class="ln">${g.hdLine!=null?"+"+Math.abs(g.hdLine):""}</span></span>${lightsHTML(g.L&&g.L.hdRecv)}<span class="betchip">注</span><span class="pct">${g.covRecv!=null?g.covRecv+"%":"–"}</span></div>
        ${g.intlStrip?`<div class="strip">🌐 ${esc(g.intlStrip)}</div>`:""}
        <div class="hr"></div>
        <div class="mkt-title">大小 <input class="basein" value="${g.totLine!=null?g.totLine:""}" readonly> <span class="odds">賠率 <b>${esc(g.totTrend||"—")}</b></span></div>
        <div class="row"><span class="tag mut">大</span><span class="nm">Over<span class="ln">${g.totLine!=null?g.totLine:""}</span></span>${lightsHTML(g.L&&g.L.over)}<span class="betchip">注</span><span class="pct">${g.covOver!=null?g.covOver+"%":"–"}</span></div>
        <div class="row"><span class="tag mut">小</span><span class="nm">Under<span class="ln">${g.totLine!=null?g.totLine:""}</span></span>${lightsHTML(g.L&&g.L.under)}<span class="betchip">注</span><span class="pct">${g.covUnder!=null?g.covUnder+"%":"–"}</span></div>
        ${g.paceNote?`<div class="cmt">節奏提示：${g.paceNote}</div>`:""}
      </div>
    </div>`;
  return card;
}

// ===== 示意卡（板子空的時候展示版型;開季接資料後自動消失）=====
const DEMO_GAME = { demo:true, time:"10/24 10:30", status:"live", curQ:3, clock:"07:24",
  away:"快艇 LAC", home:"湖人 LAL", awayScore:71, homeScore:78,
  qAway:[24,31,16,null], qHome:[29,27,22,null],
  mAway:41, oAway:44, mHome:59, oHome:56, prior:true, coldStart:"4/15",
  lineMove:"2.5", moveBanner:"線移異常：bet365 讓分 湖人 −3.5 → −6.5（開賽前 4 小時內連續同向）",
  injAway:'<span class="q">K.Leonard 出賽成疑</span>', injHome:'<span class="o">L.Dončić 缺陣</span>',
  L:{ mlAway:1, mlHome:3, hdGive:4, hdRecv:0, over:0, under:2 },
  mlTrend:"持平", hdTrend:"看好 湖人讓分", totTrend:"大幅轉向 小分",
  hdFavName:"湖人", hdDogName:"快艇", hdLine:6.5, totLine:224.5,
  covMlAway:42, covMlHome:58, covGive:55, covRecv:45, covOver:48, covUnder:52,
  intlStrip:"bet365 湖人讓6.5 ・ 台彩 湖人讓4.5（差 2.0）",
  paceNote:"兩隊近況合計中位 <b>221</b>,快艇 B2B 第二天" };

// ===== render =====
function render(){
  renderDates();
  const board=document.getElementById("board"); board.innerHTML="";
  const items=(doc.boards[doc.activeDate]||{}).items||[];
  if(!items.length){
    const e=document.createElement("div"); e.className="empty";
    e.innerHTML=`<b>NBA 排盤板（骨架版）</b><br>2026-27 賽季 10 月開打;爬蟲與官方比分管線於 9 月接入（NBA_PLAN.md 階段2）。<br>下方為卡片版型示意（DEMO v2 定稿),接上真實資料後由賽程自動生成。`;
    board.appendChild(e);
    board.appendChild(renderCard(DEMO_GAME));
  } else {
    for(const g of items) board.appendChild(renderCard(g));
  }
}
render();
</script>
</body>
</html>
