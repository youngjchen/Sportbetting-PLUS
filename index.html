<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>賽事排盤板</title>
<!-- PWA / 加到主畫面：讓 iOS 把儲存升級成持久等級 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="排盤板">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0f14;
    --panel:#151a22;
    --panel-2:#1b222c;
    --line:#2a3340;
    --ink:#e9eef5;
    --ink-dim:#8a96a6;
    --cpbl:#f2b705;
    --npb:#e23b3b;
    --kbo:#3d8bfd;
    --mlb:#28c76f;
    --lit:#ffb02e;
    --lit-glow:rgba(255,176,46,.55);
    --hot:#ff7a1a;
    --hot-glow:rgba(255,110,20,.6);
    --conflict:#ff3b5c;
    --conflict-glow:rgba(255,59,92,.5);
    --cross:#b56bff;
    --cross-glow:rgba(160,90,255,.5);
    --danger:#ff5b6e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;height:100dvh;}
  body{
    background:
      radial-gradient(1200px 500px at 50% -10%, #18202b 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(255,255,255,.012) 38px 39px),
      var(--bg);
    color:var(--ink);
    font-family:"Noto Sans TC",system-ui,sans-serif;
    display:flex;flex-direction:column;
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
  }

  /* ---------- top bar ---------- */
  header{
    display:flex;align-items:center;gap:14px;
    padding:12px 18px;
    /* clear the iPhone notch / Dynamic Island in standalone (home-screen) mode */
    padding-top:calc(12px + env(safe-area-inset-top, 0px));
    padding-left:calc(18px + env(safe-area-inset-left, 0px));
    padding-right:calc(18px + env(safe-area-inset-right, 0px));
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(255,255,255,.03),transparent);
    flex:0 0 auto;
  }
  .logo{
    font-family:"Oswald",sans-serif;font-weight:700;letter-spacing:.06em;
    font-size:20px;text-transform:uppercase;display:flex;align-items:center;gap:10px;
  }
  .logo .dot{width:11px;height:11px;border-radius:50%;background:var(--lit);box-shadow:0 0 12px var(--lit-glow);}
  .logo small{font-family:"Noto Sans TC";font-weight:500;letter-spacing:0;color:var(--ink-dim);font-size:12px;}
  .spacer{flex:1;}
  .hint{font-size:12px;color:var(--ink-dim);max-width:340px;line-height:1.4;text-align:right;}
  .btn{
    font-family:"Noto Sans TC";font-size:13px;font-weight:500;color:var(--ink);
    background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
    padding:8px 13px;cursor:pointer;transition:.15s;white-space:nowrap;
  }
  .btn:hover{border-color:#3a4756;background:#222a36;}
  .btn.danger:hover{border-color:var(--danger);color:var(--danger);}

  /* ---------- canvas viewport + world ---------- */
  #canvas{
    position:relative;flex:1 1 auto;overflow:hidden;
    touch-action:none;-webkit-user-select:none;user-select:none;
    cursor:grab;
  }
  #canvas.panning{cursor:grabbing;}
  #world{
    position:absolute;top:0;left:0;width:0;height:0;
    transform-origin:0 0;will-change:transform;
  }
  /* grid drawn on the viewport, scaled via JS background-size */
  #canvas{
    background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:20px 20px;background-position:0 0;
  }
  #empty{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--ink-dim);font-size:15px;pointer-events:none;text-align:center;line-height:1.7;z-index:1;
  }
  #empty b{color:#aeb9c8;font-weight:700;}

  /* zoom controls (bottom-right of canvas) */
  #zoomctl{
    position:absolute;right:12px;bottom:12px;z-index:200;display:flex;flex-direction:column;gap:6px;
  }
  #zoomctl button{
    width:42px;height:42px;border-radius:11px;border:1px solid var(--line);
    background:rgba(21,26,34,.92);color:var(--ink);font-size:21px;font-weight:700;line-height:1;
    cursor:pointer;backdrop-filter:blur(6px);box-shadow:0 4px 14px rgba(0,0,0,.4);
    display:grid;place-items:center;transition:.12s;touch-action:none;
  }
  #zoomctl button:hover{border-color:#3a4756;background:rgba(34,42,54,.95);}
  #zoomctl button.fit{font-size:15px;}
  #zoomctl .zlabel{
    text-align:center;font-family:"Oswald";font-size:11px;color:var(--ink-dim);
    background:rgba(21,26,34,.92);border:1px solid var(--line);border-radius:8px;padding:2px 0;backdrop-filter:blur(6px);
  }
  #saveBadge{
    position:absolute;left:12px;bottom:12px;z-index:200;
    font-size:12px;color:#8fe3b0;background:rgba(15,28,20,.92);border:1px solid #2a4a36;
    border-radius:9px;padding:5px 11px;backdrop-filter:blur(6px);pointer-events:none;
    opacity:0;transform:translateY(6px);transition:.25s;
  }
  #saveBadge.show{opacity:1;transform:translateY(0);}

  /* single token */
  .token{
    position:absolute;display:flex;align-items:center;
    background:var(--panel-2);border:1.5px solid var(--line);border-radius:11px;
    padding:9px 14px;font-weight:700;font-size:15px;cursor:grab;
    box-shadow:0 6px 18px rgba(0,0,0,.35);touch-action:none;
    border-left-width:4px;
  }
  .token.dragging{cursor:grabbing;z-index:999;transform:scale(1.04);}
  .token.merge-target{border-color:var(--lit);box-shadow:0 0 0 2px var(--lit-glow),0 6px 18px rgba(0,0,0,.4);}

  /* matchup card */
  .card{
    position:absolute;width:230px;
    transform-origin:top left;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:14px;
    box-shadow:0 10px 26px rgba(0,0,0,.45);
    touch-action:none;overflow:hidden;
  }
  .card.dragging{z-index:999;box-shadow:0 16px 40px rgba(0,0,0,.6);}
  .card.resizing{z-index:999;}
  .resize{
    position:absolute;right:0;bottom:0;width:20px;height:20px;cursor:nwse-resize;
    background:
      linear-gradient(135deg, transparent 0 45%, var(--ink-dim) 45% 55%, transparent 55% 65%, var(--ink-dim) 65% 75%, transparent 75% 85%, var(--ink-dim) 85% 95%, transparent 95%);
    opacity:.45;border-bottom-right-radius:13px;
  }
  .resize:hover{opacity:1;}
  .card .grip{
    display:flex;align-items:center;gap:6px;
    padding:10px 12px 8px;cursor:grab;
    background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);
  }
  .card.dragging .grip{cursor:grabbing;}
  .vs{
    flex:1;display:flex;align-items:center;gap:7px;font-weight:900;font-size:16px;flex-wrap:wrap;
  }
  .vs .team{padding:1px 3px;border-radius:5px;outline:none;}
  .vs .team:focus{background:#0c0f14;box-shadow:0 0 0 1.5px var(--lit);}
  .vs .slash{color:var(--ink-dim);font-weight:400;}
  .ico{
    width:24px;height:24px;display:grid;place-items:center;border-radius:7px;cursor:pointer;
    color:var(--ink-dim);font-size:15px;transition:.15s;flex:0 0 auto;
  }
  .ico:hover{background:#222a36;color:var(--ink);}
  .ico.x:hover{color:var(--danger);}

  .row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-top:1px solid rgba(255,255,255,.05);}
  .row .tag{font-family:"Oswald";font-size:12px;letter-spacing:.08em;color:var(--ink-dim);width:30px;flex:0 0 auto;text-transform:uppercase;}
  .row .tag.big{font-family:"Noto Sans TC";font-weight:900;font-size:15px;color:var(--ink);}

  .pick{display:flex;gap:5px;flex:0 0 auto;}
  .pick button{
    font-family:"Noto Sans TC";font-weight:700;font-size:13px;color:var(--ink-dim);
    background:transparent;border:1px solid var(--line);border-radius:7px;
    padding:4px 9px;cursor:pointer;transition:.12s;
  }
  .pick button:hover{border-color:#46566a;color:var(--ink);}
  .pick button.on{background:var(--lit);border-color:var(--lit);color:#1a1205;box-shadow:0 0 10px var(--lit-glow);}
  .hval{
    width:34px;background:#0c0f14;border:1px solid var(--line);border-radius:6px;
    color:var(--ink);font-size:13px;font-weight:700;text-align:center;padding:3px 2px;outline:none;
  }
  .hval:focus{border-color:var(--lit);}

  .lights{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-left:auto;}
  .light{
    width:17px;height:17px;border-radius:50%;cursor:pointer;flex:0 0 auto;transition:.12s;
  }
  .light.on{
    background:radial-gradient(circle at 35% 30%, #ffe39a, var(--lit) 70%);
    box-shadow:0 0 9px var(--lit-glow);
  }
  /* 4th light onward turns hot (red-orange) to flag a strong signal */
  .lights.hot .light.on{
    background:radial-gradient(circle at 35% 30%, #ffd0a0, var(--hot) 72%);
    box-shadow:0 0 11px var(--hot-glow);
  }
  .light.add{
    border:1.5px dashed #3a4756;color:#3a4756;display:grid;place-items:center;
    font-size:13px;line-height:1;font-weight:700;
  }
  .light.add:hover{border-color:var(--lit);color:var(--lit);}

  /* market sections + independent option rows */
  .sec{
    display:flex;align-items:center;gap:8px;padding:9px 12px 2px;
    font-family:"Oswald";font-size:11px;letter-spacing:.14em;color:var(--ink-dim);
    text-transform:uppercase;border-top:1px solid rgba(255,255,255,.06);
  }
  .sec .ln{flex:1;height:1px;background:rgba(255,255,255,.07);}
  .sec .val{
    width:40px;background:#0c0f14;border:1px solid var(--line);border-radius:6px;
    color:var(--ink);font-size:12px;font-weight:700;text-align:center;padding:3px 2px;outline:none;
    font-family:"Noto Sans TC";
  }
  .sec .val:focus{border-color:var(--lit);}
  .sec .ico{width:20px;height:20px;font-size:13px;}
  .opt{display:flex;align-items:flex-start;gap:7px;padding:5px 12px;}
  .opt .side{
    font-family:"Oswald";font-size:10px;letter-spacing:.05em;color:#0c0f14;background:var(--ink-dim);
    border-radius:5px;padding:3px 6px;font-weight:600;flex:0 0 auto;margin-top:1px;
  }
  .opt .side.give{background:var(--lit);}
  .opt .side.recv{background:#5b6b80;color:#dfe6ef;}
  /* fixed-width name column: never shrinks, never forces a wrap of its own text */
  .opt .nm{
    font-weight:700;font-size:14px;flex:0 0 5.2em;width:5.2em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;
  }
  /* lights take the rest and wrap onto new lines when they overflow */
  .opt .lights{flex:1 1 auto;margin-left:0;justify-content:flex-end;row-gap:6px;}
  .opt .lights .light{margin-top:0;}

  /* conflict: both sides of one market lit -> flag the whole block */
  .sec.conflict{color:var(--conflict);}
  .sec.conflict .ln{background:var(--conflict-glow);}
  .sec.conflict .warn{
    color:var(--conflict);font-family:"Noto Sans TC";font-weight:700;font-size:11px;
    letter-spacing:0;display:flex;align-items:center;gap:3px;
  }
  .opt.conflict{background:rgba(255,59,92,.08);box-shadow:inset 3px 0 0 var(--conflict);}
  .opt.conflict .side{background:var(--conflict);color:#fff;}

  /* summary panel on canvas */
  #summary{
    position:absolute;top:18px;left:18px;width:300px;z-index:50;
    background:linear-gradient(180deg,rgba(20,26,34,.96),rgba(16,21,28,.96));
    border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(6px);
    box-shadow:0 12px 30px rgba(0,0,0,.5);overflow:hidden;
  }
  #summary .sumhead{
    display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:grab;touch-action:none;
    font-family:"Oswald";font-weight:600;letter-spacing:.08em;font-size:13px;text-transform:uppercase;
    background:linear-gradient(180deg,rgba(255,255,255,.05),transparent);border-bottom:1px solid var(--line);
  }
  #summary .sumhead .dot{width:9px;height:9px;border-radius:50%;background:var(--hot);box-shadow:0 0 8px var(--hot-glow);}
  #summary .sumhead .count{margin-left:auto;color:var(--ink-dim);font-family:"Noto Sans TC";font-weight:700;font-size:12px;letter-spacing:0;}
  #summary .sumhead .sumtoggle{margin-left:8px;color:var(--ink-dim);font-size:13px;cursor:pointer;padding:2px 4px;border-radius:6px;}
  #summary .sumhead .sumtoggle:hover{color:var(--ink);background:rgba(255,255,255,.06);}
  #summary.mini{width:auto;}
  #summary.mini .sumhead{border-bottom:none;}
  #summary .sumbody{padding:8px 0;max-height:46vh;overflow:auto;}
  .sumrow{display:flex;align-items:baseline;gap:9px;padding:6px 14px;font-size:13px;}
  .sumrow .mt{color:var(--ink-dim);font-size:11px;flex:0 0 64px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sumrow .pk{font-weight:700;flex:1;}
  .sumrow .pk .mk{color:var(--ink-dim);font-weight:500;font-size:11px;margin-left:5px;}
  .sumrow .n{font-family:"Oswald";font-weight:700;color:var(--hot);font-size:14px;flex:0 0 auto;}
  .sumrow .n.warm{color:var(--lit);}
  #summary .sumempty{padding:14px;color:var(--ink-dim);font-size:12px;line-height:1.6;}
  .sumsec{padding:7px 14px 2px;font-family:"Oswald";font-size:10px;letter-spacing:.12em;color:var(--ink-dim);text-transform:uppercase;}
  .sumsec.collapsible{display:flex;align-items:center;justify-content:space-between;padding-right:14px;user-select:none;}
  .sumsec.collapsible:hover{color:var(--ink);}
  .sumsec .seccaret{font-size:11px;}
  .sumrow .pk .lowwarn{color:var(--ink-dim);font-size:11px;margin-left:6px;font-weight:500;}
  .sumrow.conflict .pk{color:var(--conflict);}
  .sumrow.conflict .n{color:var(--conflict);}
  .sumrow.conflict.cross .pk{color:var(--cross);}
  .sumrow.conflict.cross .n{color:var(--cross);}

  /* ---------- stats page (full-screen overlay over canvas) ---------- */
  #statspage{
    position:absolute;inset:0;z-index:120;background:var(--bg);
    display:none;flex-direction:column;overflow:hidden;
  }
  #statspage.show{display:flex;}
  .stats-toolbar{
    display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(255,255,255,.03),transparent);flex-wrap:wrap;
  }
  .stats-toolbar .title{font-weight:700;font-size:16px;margin-right:6px;}
  .stats-toolbar select, .stats-toolbar input{
    background:var(--panel-2);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;
  }
  .stats-toolbar .closebtn{margin-left:auto;}
  .stats-body{flex:1 1 auto;overflow:auto;padding:12px;}

  /* Desktop wide table */
  .stats-table{
    width:100%;border-collapse:separate;border-spacing:0;font-size:13px;color:var(--ink);
  }
  .stats-table th, .stats-table td{
    padding:8px 10px;border-bottom:1px solid var(--line);text-align:center;white-space:nowrap;
  }
  .stats-table th{
    color:var(--ink-dim);font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    position:sticky;top:0;background:var(--panel);z-index:2;
  }
  .stats-table th.group{border-left:1px solid var(--line);background:var(--panel-2);}
  .stats-table th.sortable{user-select:none;}
  .stats-table th.sortable:hover{color:var(--ink);background:rgba(255,255,255,.05);}
  .stats-table td.group{border-left:1px solid var(--line);}
  .stats-table td.team{text-align:left;font-weight:700;font-size:14px;}
  .stats-table tr:hover td{background:rgba(255,255,255,.02);}
  .statcell{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border-radius:6px;padding:4px 6px;}
  .statcell:hover{background:rgba(255,255,255,.05);}
  .statcell .wl{font-family:"Oswald";font-size:13px;font-weight:600;}
  .statcell .pct{font-size:11px;color:var(--ink-dim);}
  .statcell.empty .wl{color:#3a4756;}
  .statcell.empty .pct{visibility:hidden;}
  .pcthi{color:#28c76f;}
  .pctlo{color:var(--conflict);}

  /* Mobile stacked card layout (one team = one card with all markets listed vertically) */
  .stats-team{
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:12px;
    padding:10px 12px;margin-bottom:10px;
  }
  .stats-team .tname{font-weight:700;font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .stats-team .tname .swatch{width:8px;height:8px;border-radius:50%;}
  .stats-team .mkt{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid rgba(255,255,255,.05);}
  .stats-team .mkt:first-of-type{border-top:none;}
  .stats-team .mkt .label{flex:0 0 56px;color:var(--ink-dim);font-size:12px;font-family:"Oswald";letter-spacing:.05em;}
  .stats-team .mkt .cells{flex:1;display:flex;gap:6px;}
  .stats-team .mkt .cells .statcell{flex:1;background:rgba(255,255,255,.02);}
  .stats-team .mkt .cells .colhd{font-size:10px;color:var(--ink-dim);}

  /* Edit modal */
  #editStat{
    position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);
    display:none;align-items:center;justify-content:center;padding:20px;
  }
  #editStat.show{display:flex;}
  #editStat .box{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:18px 20px;width:340px;max-width:100%;box-shadow:0 16px 48px rgba(0,0,0,.7);
  }
  #editStat .box h3{margin:0 0 4px;font-size:16px;}
  #editStat .box .sub{color:var(--ink-dim);font-size:12px;margin-bottom:14px;}
  #editStat .row{display:flex;gap:10px;margin-bottom:10px;align-items:center;}
  #editStat .row label{flex:0 0 60px;color:var(--ink-dim);font-size:13px;}
  #editStat .row input{
    flex:1;background:var(--panel-2);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;font-size:14px;font-family:"Oswald";text-align:center;
  }
  #editStat .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}

  /* Settlement modal */
  #settleModal{
    position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);
    display:none;align-items:center;justify-content:center;padding:20px;
  }
  #settleModal.show{display:flex;}
  #settleModal .box{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:18px 20px;width:380px;max-width:100%;box-shadow:0 16px 48px rgba(0,0,0,.7);
    max-height:90vh;overflow:auto;
  }
  #settleModal h3{margin:0 0 4px;font-size:16px;}
  #settleModal .sub{color:var(--ink-dim);font-size:12px;margin-bottom:14px;}
  .settle-q{margin:14px 0;}
  .settle-q .qlabel{font-size:13px;color:var(--ink-dim);margin-bottom:6px;font-family:"Oswald";letter-spacing:.05em;}
  .settle-q .opts{display:flex;gap:6px;flex-wrap:wrap;}
  .settle-q .opt{
    flex:1 1 auto;min-width:80px;padding:10px 12px;border-radius:9px;
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    font-size:14px;font-weight:700;cursor:pointer;text-align:center;
  }
  .settle-q .opt:hover{border-color:#46566a;}
  .settle-q .opt.on{background:var(--lit);border-color:var(--lit);color:#1a1205;}
  .settle-q .opt.tie{background:#2a3340;color:#aeb9c8;}
  .settle-q .opt.tie.on{background:#5b6b80;color:#fff;}

  /* settled-mark on cards */
  .card.settled .grip{position:relative;}
  .settled-mark{
    background:#28c76f;color:#0c0f14;font-size:10px;font-weight:700;
    padding:2px 7px;border-radius:6px;letter-spacing:.04em;cursor:pointer;margin-left:6px;
  }

  /* pct hint shown on card section headers */
  .sec .pctline{
    margin-left:auto;font-size:11px;color:var(--ink-dim);font-family:"Noto Sans TC";
    font-weight:500;letter-spacing:0;text-transform:none;
  }
  .sec .pctline .v{color:#aeb9c8;font-weight:700;font-family:"Oswald";}
  .sec .pctline .v.hi{color:#28c76f;}
  .sec .pctline .v.lo{color:var(--conflict);}
  .sec .pctline .v.low-sample{color:#5b6b80;}
  .sec .pctline .ssize{font-size:9px;color:#5b6b80;margin-left:1px;font-family:"Oswald";}
  /* trend line at the bottom of a card */

<script>
const LEAGUES = {
  mlb:  { name:"MLB", color:"var(--mlb)", teams:["金鶯","紅襪","洋基","光芒","藍鳥","白襪","守護者","老虎","皇家","雙城","太空人","天使","運動家","水手","遊騎兵","勇士","馬林魚","大都會","費城人","國民","小熊","紅人","釀酒人","海盜","紅雀","響尾蛇","落磯","道奇","教士","巨人"] },

  kbo:  { name:"韓職", color:"var(--kbo)", teams:["LG雙子","KT巫師","SSG登陸者","NC恐龍","斗山熊","起亞虎","樂天巨人","三星獅","韓華鷹","培證英雄"] },
  cpbl: { name:"中職", color:"var(--cpbl)", teams:["中信兄弟","統一獅","樂天桃猿","富邦悍將","味全龍","台鋼雄鷹"] },
};
const GRID = 20, SNAP = 11, MERGE_DIST = 64;

const todayStr = ()=>{ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };

// full document: multiple dated boards
let doc = { version:2, activeDate: todayStr(), boards:{}, stats:{}, recent:[] };
let state = { items:[], summaryPos:null };   // working pointer = active board
let activeTab = "mlb";
let uid = 1;
let layoutCols = "auto";  // grid columns per row: "auto" or a fixed number
let trendThreshold = 0.55; // 數據傾向門檻: 55%/60%/65% (user adjustable)
const $ = s => document.querySelector(s);
const canvas = $("#canvas"), ghost = $("#ghost"), emptyMsg = $("#empty");
const world = $("#world");

/* ---------------- viewport (pan + zoom) ---------------- */
// view stored per-board in state.view = {x,y,k}
let view = { x:0, y:0, k:1 };
const ZMIN = 0.3, ZMAX = 2.5;
function applyView(){
  world.style.transform = `translate(${view.x}px,${view.y}px) scale(${view.k})`;
  // grid follows pan & zoom
  const g = GRID*view.k;
  canvas.style.backgroundSize = `${g}px ${g}px`;
  canvas.style.backgroundPosition = `${view.x}px ${view.y}px`;
  const zl = $("#zlabel"); if(zl) zl.textContent = Math.round(view.k*100)+"%";
}
// screen (client) coords -> world coords
function screenToWorld(cx, cy){
  const r = canvas.getBoundingClientRect();
  return { x:(cx - r.left - view.x)/view.k, y:(cy - r.top - view.y)/view.k };
}
function setZoom(k, centerClientX, centerClientY){
  k = Math.max(ZMIN, Math.min(ZMAX, k));
  const r = canvas.getBoundingClientRect();
  const cx = (centerClientX!=null?centerClientX:r.left+r.width/2);
  const cy = (centerClientY!=null?centerClientY:r.top+r.height/2);
  // keep the point under the cursor fixed while zooming
  const wx = (cx - r.left - view.x)/view.k;
  const wy = (cy - r.top - view.y)/view.k;
  view.k = k;
  view.x = cx - r.left - wx*view.k;
  view.y = cy - r.top - wy*view.k;
  applyView(); saveViewSoon();
}
function nudgeZoom(factor){ setZoom(view.k*factor); }
// fit all items into view with padding
function fitView(){
  const items = state.items;
  const r = canvas.getBoundingClientRect();
  if(!items.length){ view={x:r.width/2-20,y:30,k:1}; applyView(); saveViewSoon(); return; }
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  items.forEach(it=>{ const b=itemBox(it); minX=Math.min(minX,it.x); minY=Math.min(minY,it.y); maxX=Math.max(maxX,it.x+b.w); maxY=Math.max(maxY,it.y+b.h); });
  const pad=40, bw=maxX-minX, bh=maxY-minY;
  const k = Math.max(ZMIN, Math.min(ZMAX, Math.min((r.width-pad*2)/bw, (r.height-pad*2)/bh, 1.4)));
  view.k = k;
  view.x = (r.width - bw*k)/2 - minX*k;
  view.y = pad - minY*k;
  applyView(); saveViewSoon();
}
let _vt=null;
function saveViewSoon(){ if(_vt) clearTimeout(_vt); _vt=setTimeout(()=>{ state.view={...view}; save(); },400); }

/* ---------------- undo history ---------------- */
const history = [];
let suppress = false;
function snapshot(){
  // call BEFORE a mutating action to enable undo
  if(suppress) return;
  syncStateToDoc();
  history.push(JSON.stringify(doc));
  if(history.length>60) history.shift();
  updateUndoBtn();
}
function undo(){
  if(!history.length) return;
  const prev = history.pop();
  try{
    doc = JSON.parse(prev);
    if(!doc.boards[doc.activeDate]) doc.activeDate = Object.keys(doc.boards)[0] || todayStr();
    loadActiveBoard();
    save(); render(); buildDateBar();
  }catch(e){}
  updateUndoBtn();
}
function updateUndoBtn(){ const b=$("#undoBtn"); if(b) b.disabled = history.length===0; }

/* ---------------- board <-> doc sync ---------------- */
function ensureBoard(date){
  if(!doc.boards[date]) doc.boards[date] = { items:[], summaryPos:null };
  return doc.boards[date];
}
// produce fresh copies of all matchups in `srcItems`, with all lights cleared
function cloneMatchupsCleared(srcItems){
  return srcItems.filter(i=>i.type==="match").map(it=>({
    id: uid++, type:"match", x:it.x, y:it.y,
    away:it.away, home:it.home, awayColor:it.awayColor, homeColor:it.homeColor,
    hdFav:it.hdFav, hdVal:"", scale:it.scale||1, collapsed:false,
    mlAway:{lights:0}, mlHome:{lights:0},
    hdGive:{lights:0}, hdRecv:{lights:0},
    totVal:"", over:{lights:0}, under:{lights:0}
  }));
}
// most recent date before `date` that has matchups
function prevDateWithMatches(date){
  const dates = Object.keys(doc.boards).filter(d=>d<date).sort();
  for(let i=dates.length-1;i>=0;i--){
    const b=doc.boards[dates[i]];
    if(b && b.items && b.items.some(x=>x.type==="match")) return dates[i];
  }
  return null;
}
function syncStateToDoc(){
  const b = ensureBoard(doc.activeDate);
  b.items = state.items; b.summaryPos = state.summaryPos; b.view = state.view || view;
}
function loadActiveBoard(){
  const b = ensureBoard(doc.activeDate);
  state.items = b.items; state.summaryPos = b.summaryPos;
  state.view = b.view || null;
  view = state.view ? {...state.view} : { x:0, y:0, k:1 };
  state.items.forEach(i=>{ if(i.id>=uid) uid=i.id+1; });
  if(typeof applyView==="function") applyView();
}

/* ---------------- team stats (W-L cover rates per market/venue/season) ---------------- */
// Markets:
//   ml   = 獨贏       (has w/l/t — tie possible, esp. NPB)
//   hd   = 讓分       (the giving/favorite side covering)
//   recv = 受讓       (the receiving/underdog side covering)
//   tot  = 大分       (over)  — shared signal but stored per team because filter is per team
// Venues: "home" / "away"
// Season key: 4-digit year string ("2026"). Tie/push are excluded from both numerator AND denominator.
const RECENT_CAP = 800;
function seasonOf(dateStr){ // "2026-05-29" -> "2026"
  return (dateStr && /^\d{4}/.test(dateStr)) ? dateStr.slice(0,4) : String(new Date().getFullYear());
}
function emptyTeamRow(){
  return {
    ml:   { home:{w:0,l:0,t:0}, away:{w:0,l:0,t:0} },
    hd:   { home:{w:0,l:0},     away:{w:0,l:0}     },
    recv: { home:{w:0,l:0},     away:{w:0,l:0}     },
    tot:  { home:{w:0,l:0},     away:{w:0,l:0}     }
  };
}
function ensureTeamRow(season, team){
  if(!doc.stats) doc.stats={};
  if(!doc.stats[season]) doc.stats[season]={};
  if(!doc.stats[season][team]) doc.stats[season][team] = emptyTeamRow();
  // self-heal any old/incomplete rows
  const row = doc.stats[season][team];
  ["ml","hd","recv","tot"].forEach(m=>{
    if(!row[m]) row[m] = m==="ml" ? {home:{w:0,l:0,t:0},away:{w:0,l:0,t:0}} : {home:{w:0,l:0},away:{w:0,l:0}};
    ["home","away"].forEach(v=>{
      if(!row[m][v]) row[m][v] = m==="ml" ? {w:0,l:0,t:0} : {w:0,l:0};
      if(m==="ml" && row[m][v].t===undefined) row[m][v].t = 0;
    });
  });
  return row;
}
// add delta to one cell; market is "ml"/"hd"/"recv"/"tot"; result is "w"/"l"/"t"
function statAdd(season, team, market, venue, result, delta){
  const cell = ensureTeamRow(season, team)[market][venue];
  if(result==="w") cell.w = Math.max(0,(cell.w||0)+delta);
  else if(result==="l") cell.l = Math.max(0,(cell.l||0)+delta);
  else if(result==="t") cell.t = Math.max(0,(cell.t||0)+delta);
}
// read totals (sums home+away unless venue specified). Returns {w,l,t} where t may be undefined.
function statRead(season, team, market, venue/*optional*/){
  if(!doc.stats || !doc.stats[season] || !doc.stats[season][team]) return {w:0,l:0,t:0};
  const row = ensureTeamRow(season, team)[market];
  if(venue) return {...row[venue], t:row[venue].t||0};
  const h=row.home, a=row.away;
  return { w:(h.w||0)+(a.w||0), l:(h.l||0)+(a.l||0), t:(h.t||0)+(a.t||0) };
}
// percent string: w / (w+l), ties excluded from both. Returns null when no samples.
function pctStr(rec){
  const denom = (rec.w||0)+(rec.l||0);
  if(denom===0) return null;
  return Math.round((rec.w/denom)*100) + "%";
}
function pctNum(rec){
  const denom = (rec.w||0)+(rec.l||0);
  if(denom===0) return null;
  return rec.w/denom;
}
// add a recent-game entry (post-program settlements only). Keeps list capped.
function recentAdd(entry){
  if(!doc.recent) doc.recent = [];
  doc.recent.push(entry);
  if(doc.recent.length > RECENT_CAP) doc.recent.splice(0, doc.recent.length-RECENT_CAP);
}
// Compute W-L from the last N entries that match (team, market, venue?)
// Returns null if no recent samples are available for the filter at all.
function recentRead(team, market, venue, n){
  if(!doc.recent || !doc.recent.length) return null;
  let w=0, l=0, t=0, count=0;
  for(let i=doc.recent.length-1; i>=0; i--){
    const r = doc.recent[i];
    if(r.team!==team || r.market!==market) continue;
    if(venue && r.venue!==venue) continue;
    if(r.result==="w") w++; else if(r.result==="l") l++; else if(r.result==="t") t++;
    count++;
    if(count>=n) break;
  }
  if(count===0) return null;
  return {w,l,t};
}

/* user preference: which window to show on cards. "season" or 10/30/50 */
let pctWindow = "season";

/* ---------------- persistence (graceful, optional) ---------------- */
const LS_KEY = "sportbetting_plus_doc_v2";
let _saveTimer = null;
// debounced + immediate save to localStorage (and preview storage if present)
function save(){
  syncStateToDoc();
  doc.layoutCols = layoutCols;
  doc.pctWindow = pctWindow;
  doc.trendThreshold = trendThreshold;
  const json = JSON.stringify(doc);
  try{ localStorage.setItem(LS_KEY, json); }catch(e){}
  // also write to preview-env storage when available (harmless on GitHub Pages)
  if(window.storage){ try{ window.storage.set("board_doc_v2", json, false); }catch(_){} }
  updateSaveBadge();
}
function saveSoon(){ if(_saveTimer) clearTimeout(_saveTimer); _saveTimer=setTimeout(save, 250); }
function loadDocFromString(str){
  try{
    const d = JSON.parse(str);
    if(d && d.boards){
      doc = d;
      if(!doc.activeDate) doc.activeDate = Object.keys(doc.boards)[0]||todayStr();
      if(d.layoutCols!==undefined) layoutCols = d.layoutCols;
      if(d.pctWindow!==undefined) pctWindow = d.pctWindow;
      if(d.trendThreshold!==undefined) trendThreshold = d.trendThreshold;
      if(!doc.stats) doc.stats = {};
      if(!doc.recent) doc.recent = [];
      return true;
    }
  }catch(e){}
  return false;
}
async function load(){
  let loaded=false;
  // 1) localStorage (primary, works on GitHub Pages / Safari)
  try{ const s = localStorage.getItem(LS_KEY); if(s) loaded = loadDocFromString(s); }catch(e){}
  // 2) preview-env storage (only in this builder; ignored on GitHub Pages)
  if(!loaded && window.storage){
    try{ const r = await window.storage.get("board_doc_v2", false); if(r && r.value) loaded = loadDocFromString(r.value); }catch(_){}
  }
  // 3) migrate any older single-board localStorage format
  if(!loaded){
    try{ const old = localStorage.getItem("board_state"); if(old){ const s=JSON.parse(old); if(s&&s.items){ doc={version:2,activeDate:todayStr(),boards:{[todayStr()]:{items:s.items,summaryPos:s.summaryPos||null}}}; loaded=true; } } }catch(_){}
  }
  loadActiveBoard();
}

/* ---------------- tray ---------------- */
function buildTray(){
  const tabs = $("#tabs"); tabs.innerHTML = "";
  Object.entries(LEAGUES).forEach(([k,v])=>{
    const t = document.createElement("div");
    t.className = "tab" + (k===activeTab?" active":"");
    t.innerHTML = `<span class="swatch" style="background:${v.color}"></span>${v.name}`;
    t.onclick = ()=>{ activeTab=k; buildTray(); };
    tabs.appendChild(t);
  });
  const chips = $("#chips"); chips.innerHTML = "";
  const lg = LEAGUES[activeTab];
  const used = usedTeams();
  let shown = 0;
  lg.teams.forEach(team=>{
    if(used.has(team)) return;
    const c = document.createElement("div");
    c.className = "chip"; c.textContent = team;
    c.style.borderLeftColor = lg.color;
    c.addEventListener("pointerdown", e=> startChipDrag(e, team, lg.color));
    chips.appendChild(c);
    shown++;
  });
  if(shown===0){
    const e = document.createElement("div");
    e.style.cssText = "color:var(--ink-dim);font-size:13px;padding:4px 2px;";
    e.textContent = "本聯盟隊伍都已排上了";
    chips.appendChild(e);
  }
}

/* teams currently placed on the board (as token or inside a match) */
function usedTeams(){
  const s = new Set();
  state.items.forEach(it=>{
    if(it.type==="single") s.add(it.team);
    else { s.add(it.away); s.add(it.home); }
  });
  return s;
}

/* ---------------- rendering items ---------------- */
function render(){
  [...world.querySelectorAll(".token,.card")].forEach(n=>n.remove());
  emptyMsg.style.display = state.items.length ? "none" : "flex";
  state.items.forEach(it=> it.type==="single" ? renderToken(it) : renderCard(it));
  renderSummary();
  buildTray();
}

function renderToken(it){
  const el = document.createElement("div");
  el.className = "token"; el.dataset.id = it.id;
  el.textContent = it.team;
  el.style.left = it.x+"px"; el.style.top = it.y+"px";
  el.style.borderLeftColor = it.color;
  el.addEventListener("pointerdown", e=> startItemDrag(e, it, el));
  world.appendChild(el);
}

function normMatch(it){
  it.mlAway = it.mlAway || {lights: (it.win&&it.win.side==="away")?it.win.lights:0};
  it.mlHome = it.mlHome || {lights: (it.win&&it.win.side==="home")?it.win.lights:0};
  if(it.hdFav===undefined) it.hdFav = (it.handi&&it.handi.side) ? it.handi.side : "home";
  if(it.hdVal===undefined) it.hdVal = (it.handi&&it.handi.val)||"";
  it.hdGive = it.hdGive || {lights: (it.handi&&it.handi.lights)||0};
  it.hdRecv = it.hdRecv || {lights:0};
  it.over = it.over || {lights:0};
  it.under = it.under || {lights:0};
  if(it.totVal===undefined) it.totVal = "";
  if(it.collapsed===undefined) it.collapsed = false;
  delete it.win; delete it.handi; delete it.total;
}

function renderCard(it){
  normMatch(it);
  const el = document.createElement("div");
  el.className = "card"; el.dataset.id = it.id;
  el.style.left = it.x+"px"; el.style.top = it.y+"px";
  if(it.scale && it.scale!==1) el.style.transform = "scale("+it.scale+")";

  // ---- header ----
  const grip = document.createElement("div"); grip.className="grip";
  const vs = document.createElement("div"); vs.className="vs";
  const slash = document.createElement("span"); slash.className="slash"; slash.textContent="/";
  vs.append(mkTeam(it,"away"), slash, mkTeam(it,"home"));
  // settled mark (click to revise; clicking should NOT start drag)
  if(it.settled){
    const sm = document.createElement("span"); sm.className="settled-mark no-drag"; sm.textContent="✓ 已結算"; sm.title="按一下重新結算 / 取消結算";
    sm.onclick = (e)=>{ e.stopPropagation(); openSettleModal(it); };
    vs.appendChild(sm);
  }
  const swap = document.createElement("div"); swap.className="ico no-drag"; swap.title="主客對調"; swap.textContent="⇄";
  swap.onclick = ()=>{
    snapshot();
    [it.away,it.home]=[it.home,it.away]; [it.awayColor,it.homeColor]=[it.homeColor,it.awayColor];
    [it.mlAway,it.mlHome]=[it.mlHome,it.mlAway];
    it.hdFav = it.hdFav==="away"?"home":"away";
    save(); render();
  };
  const del = document.createElement("div"); del.className="ico x no-drag"; del.title="刪除"; del.textContent="✕";
  del.onclick = ()=>{ snapshot(); state.items = state.items.filter(x=>x.id!==it.id); save(); render(); };
  const col = document.createElement("div"); col.className="ico collapse no-drag"; col.title=it.collapsed?"展開":"收合";
  col.textContent = it.collapsed?"▸":"▾";
  col.onclick = ()=>{ snapshot(); it.collapsed=!it.collapsed; save(); render(); };
  grip.append(vs,swap,col,del);
  if(it.settled) el.classList.add("settled");
  grip.addEventListener("pointerdown", e=>{ if(e.target.closest(".no-drag")) return; startItemDrag(e,it,el); });
  // double-tap / double-click the header to collapse/expand
  let lastTapG=0;
  grip.addEventListener("pointerup", e=>{
    if(e.target.closest(".no-drag")) return;
    if(drag && drag.moved) return; // was a drag, not a tap
    const now=Date.now();
    if(now-lastTapG < 320){ snapshot(); it.collapsed=!it.collapsed; save(); render(); lastTapG=0; }
    else lastTapG=now;
  });
  // long-press the grip to open the settlement modal
  let lpSettleTimer=null, lpSettleFired=false;
  grip.addEventListener("pointerdown", e=>{
    if(e.target.closest(".no-drag")) return;
    lpSettleFired=false;
    lpSettleTimer = setTimeout(()=>{
      lpSettleFired = true;
      // cancel the in-progress card-drag so the modal opens cleanly
      if(drag && drag.it===it){ drag.el.classList.remove("dragging"); drag=null; }
      openSettleModal(it);
    }, 600);
  });
  const cancelLPSettle = ()=>{ if(lpSettleTimer){ clearTimeout(lpSettleTimer); lpSettleTimer=null; } };
  grip.addEventListener("pointerup", cancelLPSettle);
  grip.addEventListener("pointerleave", cancelLPSettle);
  grip.addEventListener("pointercancel", cancelLPSettle);
  grip.addEventListener("pointermove", e=>{
    // if user moves while pressed, treat as drag, not long-press
    if(lpSettleTimer && drag) cancelLPSettle();
  });
  // Desktop: right-click the header to open the settlement modal
  grip.addEventListener("contextmenu", e=>{
    e.preventDefault();
    openSettleModal(it);
  });
  el.appendChild(grip);

  // ---- helpers ----
  const teamColor = side => side==="away"?it.awayColor:it.homeColor;
  function optRow(badge, badgeClass, name, color, obj, conflict){
    const row = document.createElement("div"); row.className="row opt"+(conflict?" conflict":"");
    const b = document.createElement("div"); b.className="side "+badgeClass; b.textContent=badge;
    const nm = document.createElement("div"); nm.className="nm"; nm.textContent=name; if(color) nm.style.color=color;
    row.append(b, nm, mkLights(obj));
    return row;
  }
  function sec(label, extraIco, conflict, crossWarn, pctHTML){
    const s = document.createElement("div"); s.className="sec"+(conflict?" conflict":"")+(crossWarn?" cross":"");
    const t = document.createElement("span"); t.textContent=label;
    const ln = document.createElement("span"); ln.className="ln";
    s.append(t, ln);
    if(conflict){
      const w = document.createElement("span"); w.className="warn"; w.textContent="⚠ 衝突";
      s.appendChild(w);
    }else if(crossWarn){
      const w = document.createElement("span"); w.className="warn cross"; w.textContent=crossWarn;
      s.appendChild(w);
    }
    if(pctHTML){
      const p = document.createElement("span"); p.innerHTML = pctHTML; // already wrapped in .pctline
      // unwrap (pctHTML returns <span class="pctline">...</span>): append the inner span directly
      if(p.firstElementChild) s.appendChild(p.firstElementChild);
    }
    if(extraIco) s.appendChild(extraIco);
    return s;
  }

  // conflict = both sides of the same market are lit
  const mlConflict  = it.mlAway.lights>0 && it.mlHome.lights>0;
  const hdConflict  = it.hdGive.lights>0 && it.hdRecv.lights>0;
  const totConflict = it.over.lights>0  && it.under.lights>0;

  // cross-market conflict: betting the favorite to COVER the spread (讓) while
  // also betting the OPPONENT to win outright (對手獨贏) is self-contradictory.
  const favSideX = it.hdFav, undSideX = it.hdFav==="away"?"home":"away";
  const oppML = (undSideX==="away") ? it.mlAway.lights : it.mlHome.lights;   // opponent's moneyline
  const crossConflict = it.hdGive.lights>0 && oppML>0;

  // strong signal = some side has >=3 lights in a market that is NOT in conflict AND no cross-conflict
  const strongSignal = !crossConflict && (
    (!mlConflict  && (it.mlAway.lights>=3 || it.mlHome.lights>=3)) ||
    (!hdConflict  && (it.hdGive.lights>=3 || it.hdRecv.lights>=3)) ||
    (!totConflict && (it.over.lights>=3  || it.under.lights>=3))
  );
  if(mlConflict||hdConflict||totConflict) el.classList.add("has-conflict");
  else if(crossConflict) el.classList.add("has-cross");
  else if(strongSignal && !strongShouldBeDampened(it)) el.classList.add("has-strong");
  else if(strongSignal && strongShouldBeDampened(it)) el.classList.add("has-strong-dim");
  if(it.collapsed) el.classList.add("collapsed");

  const favSide0 = it.hdFav, undSide0 = it.hdFav==="away"?"home":"away";
  // net lean still computed for the collapsed one-line summary
  function lean(aLit,aLabel,bLit,bLabel){
    if(aLit===bLit) return null;
    const winLabel = aLit>bLit ? aLabel : bLabel;
    const n = Math.abs(aLit-bLit);
    return { txt:`${winLabel} +${n}`, n, winLabel };
  }
  const mlLean  = mlConflict ?null: lean(it.mlAway.lights, it.away, it.mlHome.lights, it.home);
  const hdLean  = hdConflict ?null: lean(it.hdGive.lights, `${it[favSide0]}讓`, it.hdRecv.lights, `${it[undSide0]}受讓`);
  const totLean = totConflict?null: lean(it.over.lights, "大分", it.under.lights, "小分");

  // ---- 獨贏 ----
  el.appendChild(sec("獨贏", null, mlConflict, crossConflict?"⚠ 與讓分矛盾":null, sectionPctHTML(it,"ml")));
  el.appendChild(optRow("客", "", it.away, teamColor("away"), it.mlAway, mlConflict));
  el.appendChild(optRow("主", "", it.home, teamColor("home"), it.mlHome, mlConflict));

  // ---- 讓分 / 受讓 ----
  const favSwap = document.createElement("div"); favSwap.className="ico no-drag"; favSwap.title="切換讓分方"; favSwap.textContent="⇄";
  favSwap.onclick=()=>{ snapshot(); it.hdFav = it.hdFav==="away"?"home":"away"; save(); render(); };
  el.appendChild(sec("讓分", favSwap, hdConflict, crossConflict?"⚠ 與獨贏矛盾":null, sectionPctHTML(it,"hd")));
  const favSide = it.hdFav, undSide = it.hdFav==="away"?"home":"away";
  el.appendChild(optRow("讓", "give", it[favSide], teamColor(favSide), it.hdGive, hdConflict));
  el.appendChild(optRow("受讓", "recv", it[undSide], teamColor(undSide), it.hdRecv, hdConflict));

  // ---- 大小分 ----
  el.appendChild(sec("大小分", null, totConflict, null, sectionPctHTML(it,"tot")));
  el.appendChild(optRow("大", "", "大分", null, it.over, totConflict));
  el.appendChild(optRow("小", "", "小分", null, it.under, totConflict));

  // ---- trend line (數據傾向) ----
  const th = trendHTML(it);
  if(th){ const w=document.createElement("div"); w.innerHTML=th; if(w.firstElementChild) el.appendChild(w.firstElementChild); }

  // ---- collapsed one-line summary ----
  const sl = document.createElement("div"); sl.className="summary-line";
  const pills = [];
  const pill = (txt,n)=>{ const p=document.createElement("span"); p.className="pill"+(n>=4?" hot":""); p.innerHTML=`<span class="pin"></span>${esc(txt)} ●${n}`; pills.push(p); };
  if(mlLean  && mlLean.n>=3)  pill(mlLean.winLabel, mlLean.n);
  if(hdLean  && hdLean.n>=3)  pill(`${hdLean.winLabel}${it.hdVal?` ${it.hdVal}`:""}`, hdLean.n);
  if(totLean && totLean.n>=3) pill(`${totLean.winLabel}${it.totVal?` ${it.totVal}`:""}`, totLean.n);
  if(mlConflict||hdConflict||totConflict){ const w=document.createElement("span"); w.className="pill"; w.style.color="var(--conflict)"; w.style.borderColor="var(--conflict)"; w.textContent="⚠ 有衝突"; pills.push(w); }
  if(pills.length){ pills.forEach(p=>sl.appendChild(p)); }
  else { const n=document.createElement("span"); n.className="none"; n.textContent="尚無 3 燈以上的選擇"; sl.appendChild(n); }
  el.appendChild(sl);

  const rz = document.createElement("div"); rz.className="resize no-drag"; rz.title="拖曳調整寬度";
  rz.addEventListener("pointerdown", e=> startResize(e, it, el));
  el.appendChild(rz);

  world.appendChild(el);
}

function mkTeam(it,side){
  const s = document.createElement("span");
  s.className="team no-drag"; s.contentEditable=true; s.textContent=it[side];
  s.style.color = side==="away"?it.awayColor:it.homeColor;
  s.onpointerdown = e=> e.stopPropagation();
  s.onblur = ()=>{ it[side]=s.textContent.trim()||it[side]; save(); render(); };
  s.onkeydown = e=>{ if(e.key==="Enter"){ e.preventDefault(); s.blur(); } };
  return s;
}

function mkLights(obj){
  const wrap = document.createElement("div"); wrap.className="lights no-drag";
  if(obj.lights>3) wrap.classList.add("hot");
  // long-press anywhere on the light cluster clears it to zero
  let lpTimer=null, lpFired=false;
  const startLP = ()=>{ lpFired=false; lpTimer=setTimeout(()=>{ lpFired=true; if(obj.lights>0){ snapshot(); obj.lights=0; save(); render(); repackColumns(); } }, 550); };
  const cancelLP = ()=>{ if(lpTimer){ clearTimeout(lpTimer); lpTimer=null; } };
  wrap.addEventListener("pointerdown", startLP);
  wrap.addEventListener("pointerup", cancelLP);
  wrap.addEventListener("pointerleave", cancelLP);
  wrap.addEventListener("pointercancel", cancelLP);
  for(let i=0;i<obj.lights;i++){
    const d = document.createElement("div"); d.className="light on";
    d.title="點掉減少（長按整排清零）"; d.onclick=()=>{ if(lpFired){lpFired=false;return;} snapshot(); obj.lights=Math.max(0,obj.lights-1); save(); render(); repackColumns(); };
    wrap.appendChild(d);
  }
  if(obj.lights<12){
    const add = document.createElement("div"); add.className="light add"; add.textContent="+";
    add.title="點亮一個"; add.onclick=()=>{ if(lpFired){lpFired=false;return;} snapshot(); obj.lights++; save(); render(); repackColumns(); };
    wrap.appendChild(add);
  }
  return wrap;
}

/* ---------------- summary panel ---------------- */
// collect picks with >3 lights and no conflict in their market
function collectSummary(){
  const strong = [], conflicts = [];
  state.items.forEach(it=>{
    if(it.type!=="match") return;
    normMatch(it);
    const favSide = it.hdFav, undSide = it.hdFav==="away"?"home":"away";
    const matchName = `${it.away}/${it.home}`;
    const mlC  = it.mlAway.lights>0 && it.mlHome.lights>0;
    const hdC  = it.hdGive.lights>0 && it.hdRecv.lights>0;
    const totC = it.over.lights>0  && it.under.lights>0;
    const oppML = (undSide==="away") ? it.mlAway.lights : it.mlHome.lights;
    const crossC = it.hdGive.lights>0 && oppML>0;
    if(mlC)  conflicts.push({matchName, market:"獨贏", kind:"same"});
    if(hdC)  conflicts.push({matchName, market:"讓分", kind:"same"});
    if(totC) conflicts.push({matchName, market:"大小分", kind:"same"});
    if(crossC) conflicts.push({matchName, market:"讓分↔對手獨贏", kind:"cross"});
    // strong entries: attach `it` + `market` so renderSummary can do per-entry checks (e.g. "⚠ 過盤率低")
    const add=(cond,lights,pick,mk,market)=>{ if(cond && lights>=3) strong.push({matchName, pick, mk, n:lights, it, market}); };
    const mlAwayOK  = !mlC && !(crossC && undSide==="away");
    const mlHomeOK  = !mlC && !(crossC && undSide==="home");
    const hdGiveOK  = !hdC && !crossC;
    const hdRecvOK  = !hdC;
    add(mlAwayOK, it.mlAway.lights, it.away, "獨贏", "ml");
    add(mlHomeOK, it.mlHome.lights, it.home, "獨贏", "ml");
    add(hdGiveOK, it.hdGive.lights, it[favSide], "讓"+(it.hdVal?` ${it.hdVal}`:""), "hd");
    add(hdRecvOK, it.hdRecv.lights, it[undSide], "受讓"+(it.hdVal?` ${it.hdVal}`:""), "recv");
    add(!totC, it.over.lights,  "大分", "大小分"+(it.totVal?` ${it.totVal}`:""), "tot");
    add(!totC, it.under.lights, "小分", "大小分"+(it.totVal?` ${it.totVal}`:""), "tot");
  });
  strong.sort((a,b)=>b.n-a.n);
  return {strong, conflicts};
}

function renderSummary(){
  const old = canvas.querySelector("#summary"); if(old) old.remove();
  if(!state.items.some(i=>i.type==="match")) return;
  const {strong, conflicts} = collectSummary();
  if(strong.length===0 && conflicts.length===0) return;

  const r = canvas.getBoundingClientRect();
  const pos = state.summaryPos || {x: Math.max(12, r.width-312), y: 12};
  const box = document.createElement("div"); box.id="summary";
  if(doc.summaryCollapsed) box.classList.add("mini");
  box.style.left = pos.x+"px"; box.style.top = pos.y+"px";

  const head = document.createElement("div"); head.className="sumhead";
  const caret = doc.summaryCollapsed ? "▸" : "▾";
  head.innerHTML = `<span class="dot"></span>重點總結<span class="count">${strong.length} 個強訊號</span>`+
                   `<span class="sumtoggle no-drag" title="收合／展開">${caret}</span>`;
  head.addEventListener("pointerdown", startSummaryDrag);
  const tog = head.querySelector(".sumtoggle");
  // intercept pointer events on the toggle so the drag handler never runs
  tog.addEventListener("pointerdown", (e)=>{ e.stopPropagation(); });
  tog.addEventListener("click", (e)=>{
    e.stopPropagation();
    doc.summaryCollapsed = !doc.summaryCollapsed; save(); render();
  });
  box.appendChild(head);

  if(doc.summaryCollapsed){ canvas.appendChild(box); return; }

  const body = document.createElement("div"); body.className="sumbody";
  if(strong.length){
    const t = document.createElement("div"); t.className="sumsec"; t.textContent="3 個以上（無衝突）";
    body.appendChild(t);
    strong.forEach(s=>{
      const r = document.createElement("div"); r.className="sumrow";
      const low = (s.it && s.market) ? isLitSideLow(s.it, s.market) : false;
      const lowWarn = low ? `<span class="lowwarn">⚠ 過盤率低</span>` : "";
      r.innerHTML = `<span class="mt">${esc(s.matchName)}</span>`+
                    `<span class="pk">${esc(s.pick)}<span class="mk">${esc(s.mk)}</span>${lowWarn}</span>`+
                    `<span class="n${s.n>3?'':' warm'}">●${s.n}</span>`;
      body.appendChild(r);
    });
  }
  if(conflicts.length){
    const cCar = doc.conflictsCollapsed ? "▸" : "▾";
    const t = document.createElement("div"); t.className="sumsec collapsible";
    t.innerHTML = `<span>衝突 / 矛盾</span><span class="seccaret">${cCar}</span>`;
    t.style.cursor = "pointer";
    t.onclick = ()=>{ doc.conflictsCollapsed = !doc.conflictsCollapsed; save(); render(); };
    body.appendChild(t);
    if(!doc.conflictsCollapsed){
      conflicts.forEach(c=>{
        const r = document.createElement("div"); r.className="sumrow conflict"+(c.kind==="cross"?" cross":"");
        const desc = c.kind==="cross" ? `${esc(c.market)} 矛盾` : `${esc(c.market)} 兩邊都有燈`;
        r.innerHTML = `<span class="mt">${esc(c.matchName)}</span>`+
                      `<span class="pk">${desc}</span>`+
                      `<span class="n">⚠</span>`;
        body.appendChild(r);
      });
    }
  }
  if(!strong.length && conflicts.length){
    // still useful, no empty note needed
  }
  box.appendChild(body);
  canvas.appendChild(box);
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

let sumDrag = null;
function startSummaryDrag(e){
  if(e.target.closest(".no-drag")) return;
  e.preventDefault(); e.stopPropagation();
  const box = canvas.querySelector("#summary");
  const r = box.getBoundingClientRect();
  sumDrag = { box, offX:e.clientX-r.left, offY:e.clientY-r.top };
  try{ box.setPointerCapture(e.pointerId); }catch(_){}
}
function moveSummaryDrag(e){
  if(!sumDrag) return;
  const cr = canvas.getBoundingClientRect();
  const x = Math.max(0, Math.min(cr.width-60, e.clientX-cr.left-sumDrag.offX));
  const y = Math.max(0, Math.min(cr.height-40, e.clientY-cr.top -sumDrag.offY));
  state.summaryPos = {x,y};
  sumDrag.box.style.left = x+"px"; sumDrag.box.style.top = y+"px";
}
function endSummaryDrag(){ if(sumDrag){ sumDrag=null; save(); } }

/* ---------------- snapping (all in WORLD coords) ---------------- */
// world-space footprint of an item (offsetWidth is unaffected by the world transform)
function itemBox(it){
  const id = typeof it==="object" ? it.id : it;
  const obj = typeof it==="object" ? it : state.items.find(s=>s.id===id);
  const el = world.querySelector(`[data-id="${id}"]`);
  const s = (obj && obj.scale) ? obj.scale : 1;
  if(!el) return {w:0,h:0};
  return {w:el.offsetWidth*s, h:el.offsetHeight*s};
}
// edge-aware snap: aligns left/right/top/bottom edges to other items, falls back to grid
function snap(it, x, y){
  let sx = Math.round(x/GRID)*GRID, sy = Math.round(y/GRID)*GRID;
  const me = itemBox(it);
  let bestX = SNAP, bestY = SNAP;
  state.items.forEach(o=>{
    if(o.id===it.id) return;
    const ob = itemBox(o);
    // align my-left or my-right to other's left/right
    [ [x,       o.x,       0],      // my left  -> other left
      [x,       o.x+ob.w,  0],      // my left  -> other right
      [x+me.w,  o.x+ob.w, -me.w],   // my right -> other right
      [x+me.w,  o.x,      -me.w]    // my right -> other left
    ].forEach(([a,b,adj])=>{ const d=Math.abs(a-b); if(d<bestX){ bestX=d; sx=b+adj; } });
    // align my-top or my-bottom to other's top/bottom
    [ [y,       o.y,       0],
      [y,       o.y+ob.h,  0],
      [y+me.h,  o.y+ob.h, -me.h],
      [y+me.h,  o.y,      -me.h]
    ].forEach(([a,b,adj])=>{ const d=Math.abs(a-b); if(d<bestY){ bestY=d; sy=b+adj; } });
  });
  return {x:Math.max(0,Math.round(sx)), y:Math.max(0,Math.round(sy))};
}

/* ---------------- dragging existing items ---------------- */
let drag = null;
function startItemDrag(e, it, el){
  if(e.target.closest(".no-drag")) return;
  e.preventDefault();
  // grab offset in WORLD space
  const w0 = screenToWorld(e.clientX, e.clientY);
  drag = { it, el, offX:w0.x-it.x, offY:w0.y-it.y, moved:false, pid:e.pointerId, snapped:false };
  el.classList.add("dragging");
  try{ el.setPointerCapture(e.pointerId); }catch(_){}
}
function moveItemDrag(e){
  if(!drag) return;
  const w0 = screenToWorld(e.clientX, e.clientY);
  let x = w0.x - drag.offX;
  let y = w0.y - drag.offY;

  if(!drag.snapped){ snapshot(); drag.snapped=true; } // one undo step per drag

  // live snap for cards (tokens snap on drop so merge stays easy)
  if(drag.it.type==="match"){
    const p = snap(drag.it, x, y); x = p.x; y = p.y;
  }

  drag.it.x = x; drag.it.y = y; drag.moved = true;
  drag.el.style.left = x+"px"; drag.el.style.top = y+"px";

  // highlight merge target for single tokens
  world.querySelectorAll(".token.merge-target").forEach(n=>n.classList.remove("merge-target"));
  if(drag.it.type==="single"){
    const t = findMergeTarget(drag.it);
    if(t){ const te = world.querySelector(`.token[data-id="${t.id}"]`); if(te) te.classList.add("merge-target"); }
  }
}
function endItemDrag(e){
  if(!drag) return;
  const it = drag.it;
  if(it.type==="single"){
    const target = findMergeTarget(it);
    if(target){ mergeTokens(target, it); drag=null; save(); render(); return; }
  }
  const p = snap(it, it.x, it.y); it.x=p.x; it.y=p.y;
  drag.el.classList.remove("dragging");
  world.querySelectorAll(".token.merge-target").forEach(n=>n.classList.remove("merge-target"));
  drag = null; save(); render();
}
function center(it){ const w = it.type==="single"?70:115, h=it.type==="single"?20:46; return {cx:it.x+w, cy:it.y+h}; }

/* ---------------- resizing cards (proportional scale) ---------------- */
let rsz = null;
function startResize(e, it, el){
  e.preventDefault(); e.stopPropagation();
  snapshot();
  rsz = { it, el, startX:e.clientX, startY:e.clientY,
          startScale: it.scale || 1, baseW: el.offsetWidth, pid:e.pointerId };
  el.classList.add("resizing");
  try{ el.setPointerCapture(e.pointerId); }catch(_){}
}
function moveResize(e){
  if(!rsz) return;
  // drive scale by horizontal drag, in world space (divide by zoom so it tracks the finger)
  const dx = (e.clientX - rsz.startX) / view.k;
  let s = rsz.startScale + dx / rsz.baseW;
  s = Math.max(0.7, Math.min(2.4, s));
  // snap scale to clean stops for tidy alignment
  [0.75,1,1.25,1.5,1.75,2].forEach(stop=>{ if(Math.abs(s-stop)<0.05) s=stop; });
  rsz.it.scale = Math.round(s*100)/100;
  rsz.el.style.transform = "scale("+rsz.it.scale+")";
}
function endResize(){
  if(!rsz) return;
  rsz.el.classList.remove("resizing");
  // re-snap position after size change so edges line back up
  const p = snap(rsz.it, rsz.it.x, rsz.it.y); rsz.it.x=p.x; rsz.it.y=p.y;
  rsz.el.style.left = rsz.it.x+"px"; rsz.el.style.top = rsz.it.y+"px";
  rsz = null; save();
}

function findMergeTarget(it){
  const c = center(it); let best=null, bd=MERGE_DIST;
  state.items.forEach(o=>{ if(o.id===it.id || o.type!=="single") return;
    const oc = center(o); const d = Math.hypot(c.cx-oc.cx, c.cy-oc.cy);
    if(d<bd){ bd=d; best=o; }
  });
  return best;
}
function mergeTokens(target, dragged){
  const m = { id:uid++, type:"match", x:target.x, y:target.y,
    away:target.team, home:dragged.team, awayColor:target.color, homeColor:dragged.color,
    mlAway:{lights:0}, mlHome:{lights:0},
    hdFav:"home", hdVal:"", hdGive:{lights:0}, hdRecv:{lights:0},
    totVal:"", over:{lights:0}, under:{lights:0} };
  state.items = state.items.filter(x=>x.id!==target.id && x.id!==dragged.id);
  state.items.push(m);
}

/* ---------------- dragging new chip from tray ---------------- */
let chipDrag = null;
function startChipDrag(e, team, color){
  e.preventDefault();
  chipDrag = { team, color, pid:e.pointerId, sx:e.clientX, sy:e.clientY, moved:false };
  ghost.textContent = team; ghost.style.borderLeftColor = color;
  ghost.style.display="block"; ghost.style.left=e.clientX+"px"; ghost.style.top=e.clientY+"px";
}
function moveChipDrag(e){
  if(!chipDrag) return;
  if(Math.hypot(e.clientX-chipDrag.sx, e.clientY-chipDrag.sy)>6) chipDrag.moved=true;
  ghost.style.left=e.clientX+"px"; ghost.style.top=e.clientY+"px";
}
function endChipDrag(e){
  if(!chipDrag) return;
  ghost.style.display="none";
  const cr = canvas.getBoundingClientRect();
  const overCanvas = e.clientX>=cr.left && e.clientX<=cr.right && e.clientY>=cr.top && e.clientY<=cr.bottom;
  if(overCanvas || !chipDrag.moved){
    snapshot();
    let x,y;
    if(overCanvas){ const w0 = screenToWorld(e.clientX-40*view.k, e.clientY-16*view.k); x=w0.x; y=w0.y; }
    else { // tap-to-add: drop near top-left of current view in world coords
      const tl = screenToWorld(cr.left+40, cr.top+40);
      const n=state.items.length; x = tl.x + (n%6)*30; y = tl.y + (n%6)*30;
    }
    // drop onto an existing single token => instant merge
    const tmp = {id:-1,type:"single",x,y};
    const tgt = findMergeTarget(tmp);
    if(tgt){
      const dragged = {id:uid++, type:"single", team:chipDrag.team, color:chipDrag.color, x, y};
      mergeTokens(tgt, dragged);
    }else{
      const p = snap({id:-1}, x, y);
      state.items.push({ id:uid++, type:"single", team:chipDrag.team, color:chipDrag.color, x:p.x, y:p.y });
    }
    save(); render();
  }
  chipDrag = null;
}

/* ---------------- global pointer handlers ---------------- */
function anyDragActive(){ return !!(sumDrag || rsz || drag || chipDrag); }
window.addEventListener("pointermove", e=>{
  if(anyDragActive() && e.cancelable) e.preventDefault();
  moveSummaryDrag(e); moveResize(e); moveItemDrag(e); moveChipDrag(e);
}, {passive:false});
window.addEventListener("pointerup",   e=>{ endSummaryDrag(e); endResize(e); endItemDrag(e); endChipDrag(e); });
// also catch touch fallbacks so a drag still finishes if pointer events misbehave
window.addEventListener("touchmove", e=>{ if(anyDragActive() && e.cancelable) e.preventDefault(); }, {passive:false});
window.addEventListener("pointercancel", e=>{
  // commit the drag instead of throwing it away (iOS fires cancel mid-gesture)
  if(sumDrag){ endSummaryDrag(e); }
  if(rsz){ endResize(e); }
  if(drag){ endItemDrag(e); }
  if(chipDrag){ endChipDrag(e); }
  if(gesture.pointers.has(e.pointerId)) endGesturePointer(e);
});

/* ---------------- canvas gestures: pan (1 finger) + pinch zoom (2 fingers) ---------------- */
const gesture = { pointers:new Map(), mode:null, startX:0, startY:0, startView:null, pinch:null, lastTap:0,
                  // velocity tracking for inertia
                  velSamples:[], lastX:0, lastY:0, lastT:0 };
// inertia animation state
let inertia = null; // {vx, vy, raf}
function stopInertia(){
  if(inertia){ cancelAnimationFrame(inertia.raf); inertia=null; }
}
function startInertia(vx, vy){
  stopInertia();
  // require a meaningful flick to engage inertia (pixels/ms)
  const speed = Math.hypot(vx, vy);
  if(speed < 0.25) return;
  inertia = { vx, vy, raf:0 };
  const friction = 0.94;            // per frame at ~60fps -> ~6% loss/frame
  const minSpeed = 0.04;            // stop threshold (px/ms)
  let prev = performance.now();
  const step = (now)=>{
    if(!inertia) return;
    const dt = Math.min(40, now-prev); prev = now;
    view.x += inertia.vx * dt;
    view.y += inertia.vy * dt;
    applyView();
    // decay (friction^frames at 60fps), where frames ~= dt/16.67
    const decay = Math.pow(friction, dt/16.67);
    inertia.vx *= decay; inertia.vy *= decay;
    if(Math.hypot(inertia.vx, inertia.vy) < minSpeed){ stopInertia(); saveViewSoon(); return; }
    inertia.raf = requestAnimationFrame(step);
  };
  inertia.raf = requestAnimationFrame(step);
}
function isInteractive(target){
  // These elements handle their own gestures, so the canvas must NOT pan when they're pressed:
  //  - .grip  : the card's top bar (drags the card itself)
  //  - .no-drag: lights, +/- buttons, swap/collapse/delete icons, resize handle, editable names
  //  - #summary / #zoomctl : floating panels
  // Pressing anywhere else on a card body falls through to panning (move-canvas).
  return !!(target.closest(".grip,.no-drag,#summary,#zoomctl,.token"));
}
canvas.addEventListener("pointerdown", e=>{
  // ignore presses that begin on a card/token/summary/zoom — those have their own handlers
  if(isInteractive(e.target)) return;
  stopInertia(); // any new press cancels coasting
  gesture.pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  try{ canvas.setPointerCapture(e.pointerId); }catch(_){}

  if(gesture.pointers.size===1){
    gesture.mode = "pan";
    gesture.startX = e.clientX; gesture.startY = e.clientY;
    gesture.startView = {...view};
    gesture.velSamples.length=0;
    gesture.lastX = e.clientX; gesture.lastY = e.clientY; gesture.lastT = performance.now();
    canvas.classList.add("panning");
  } else if(gesture.pointers.size===2){
    gesture.mode = "pinch";
    const pts = [...gesture.pointers.values()];
    gesture.pinch = {
      cx:(pts[0].x+pts[1].x)/2, cy:(pts[0].y+pts[1].y)/2,
      dist:Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y),
      startK:view.k, startView:{...view}
    };
    canvas.classList.remove("panning");
  }
});
canvas.addEventListener("pointermove", e=>{
  if(!gesture.pointers.has(e.pointerId)) return;
  gesture.pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(e.cancelable) e.preventDefault();

  if(gesture.mode==="pan" && gesture.pointers.size===1){
    view.x = gesture.startView.x + (e.clientX - gesture.startX);
    view.y = gesture.startView.y + (e.clientY - gesture.startY);
    applyView();
    // record velocity sample (px per ms)
    const now = performance.now();
    const dt = now - gesture.lastT;
    if(dt > 0){
      gesture.velSamples.push({ vx:(e.clientX-gesture.lastX)/dt, vy:(e.clientY-gesture.lastY)/dt, t:now });
      if(gesture.velSamples.length>5) gesture.velSamples.shift();
      gesture.lastX = e.clientX; gesture.lastY = e.clientY; gesture.lastT = now;
    }
  } else if(gesture.mode==="pinch" && gesture.pointers.size>=2){
    const pts = [...gesture.pointers.values()].slice(0,2);
    const dist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
    const cx = (pts[0].x+pts[1].x)/2, cy = (pts[0].y+pts[1].y)/2;
    const r = canvas.getBoundingClientRect();
    // world point under the pinch center at gesture start
    const sv = gesture.pinch.startView;
    const wx = (gesture.pinch.cx - r.left - sv.x)/sv.k;
    const wy = (gesture.pinch.cy - r.top  - sv.y)/sv.k;
    let k = sv.k * (dist/gesture.pinch.dist);
    k = Math.max(ZMIN, Math.min(ZMAX, k));
    view.k = k;
    // keep the (moving) pinch center anchored to its world point
    view.x = cx - r.left - wx*k;
    view.y = cy - r.top  - wy*k;
    applyView();
  }
}, {passive:false});
function endGesturePointer(e){
  const wasPan = gesture.mode==="pan" && gesture.pointers.size===1;
  gesture.pointers.delete(e.pointerId);
  try{ canvas.releasePointerCapture(e.pointerId); }catch(_){}
  if(gesture.pointers.size===0){
    // tap detection (no real move) -> double-tap empty = fit
    if(gesture.mode==="pan"){
      const moved = Math.hypot(e.clientX-gesture.startX, e.clientY-gesture.startY) > 6;
      if(!moved){
        const now=Date.now();
        if(now-gesture.lastTap < 300){ fitView(); gesture.lastTap=0; }
        else gesture.lastTap=now;
      } else if(wasPan){
        // average the most recent samples for stable launch velocity
        const recent = gesture.velSamples.filter(s=> performance.now()-s.t < 80);
        if(recent.length){
          let vx=0, vy=0; recent.forEach(s=>{vx+=s.vx; vy+=s.vy;});
          startInertia(vx/recent.length, vy/recent.length);
        }
      }
    }
    gesture.mode=null; gesture.pinch=null; canvas.classList.remove("panning");
    saveViewSoon();
  } else if(gesture.pointers.size===1){
    // dropped from pinch to pan
    const p=[...gesture.pointers.values()][0];
    gesture.mode="pan"; gesture.startX=p.x; gesture.startY=p.y; gesture.startView={...view};
    gesture.velSamples.length=0; gesture.lastX=p.x; gesture.lastY=p.y; gesture.lastT=performance.now();
  }
}
canvas.addEventListener("pointerup", endGesturePointer);
// Stop inertia when starting a card drag, resize, summary drag, etc.
window.addEventListener("pointerdown", ()=>{ if(inertia) stopInertia(); }, true);
// desktop wheel / trackpad zoom
canvas.addEventListener("wheel", e=>{
  if(isInteractive(e.target)) return;
  e.preventDefault();
  const factor = e.deltaY<0 ? 1.12 : 1/1.12;
  setZoom(view.k*factor, e.clientX, e.clientY);
}, {passive:false});

/* ---------------- date bar ---------------- */
function fmtDate(d){ const [y,m,dd]=d.split("-"); return `${parseInt(m)}/${parseInt(dd)}`; }
function buildDateBar(){
  const bar = $("#datebar"); if(!bar) return;
  bar.innerHTML = "";
  const lbl = document.createElement("span"); lbl.className="dlabel"; lbl.textContent="日期"; bar.appendChild(lbl);
  const dates = Object.keys(doc.boards).sort();
  if(!dates.includes(doc.activeDate)) dates.push(doc.activeDate);
  dates.sort();
  dates.forEach(d=>{
    const b = doc.boards[d];
    const n = b ? b.items.filter(i=>i.type==="match").length : 0;
    const chip = document.createElement("button");
    chip.className = "datechip"+(d===doc.activeDate?" active":"");
    chip.innerHTML = `${fmtDate(d)}${n?`<span class="cnt">${n}</span>`:""}`;
    chip.title = d;
    chip.onclick = ()=> switchDate(d);
    // long-press a date to delete it
    let lp=null,fired=false;
    chip.addEventListener("pointerdown",()=>{ fired=false; lp=setTimeout(()=>{ fired=true; deleteDate(d); },650); });
    const cx=()=>{ if(lp)clearTimeout(lp); }; chip.addEventListener("pointerup",cx); chip.addEventListener("pointerleave",cx);
    bar.appendChild(chip);
  });
  const add = document.createElement("button"); add.className="datechip adddate"; add.textContent="＋ 新日期";
  add.onclick = addDate; bar.appendChild(add);
}
function switchDate(d){
  if(d===doc.activeDate) return;
  save(); doc.activeDate = d; loadActiveBoard(); save(); render(); buildDateBar();
}
function addDate(){
  const def = todayStr();
  const input = prompt("輸入日期（YYYY-MM-DD），或直接確定使用今天：", def);
  if(input===null) return;
  let d = input.trim() || def;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(d)){ alert("格式需為 YYYY-MM-DD"); return; }
  const existed = !!doc.boards[d];
  snapshot();
  const b = ensureBoard(d);
  // if this is a brand-new empty day, offer to bring over the previous day's matchups
  if(!existed && (!b.items || b.items.length===0)){
    const src = prevDateWithMatches(d);
    if(src){
      const n = doc.boards[src].items.filter(x=>x.type==="match").length;
      if(confirm(`要把 ${fmtDate(src)} 的 ${n} 場對戰組合複製過來嗎？\n（隊伍、主客、讓分方向都保留，圓圈會清空）`)){
        b.items = cloneMatchupsCleared(doc.boards[src].items);
      }
    }
  }
  switchDate(d);
}
// copy matchups from a chosen day into the current day
function copyMatchupsFromDay(){
  closeMore();
  const others = Object.keys(doc.boards).filter(d=>d!==doc.activeDate && doc.boards[d].items.some(x=>x.type==="match")).sort().reverse();
  if(!others.length){ alert("沒有其他含對戰的日期可以複製。"); return; }
  const list = others.map((d,i)=>`${i+1}. ${fmtDate(d)}（${doc.boards[d].items.filter(x=>x.type==="match").length} 場）`).join("\n");
  const pick = prompt(`要複製哪一天的對戰組合到今天（${fmtDate(doc.activeDate)}）？\n輸入編號：\n\n${list}`, "1");
  if(pick===null) return;
  const idx = parseInt(pick,10)-1;
  if(isNaN(idx)||idx<0||idx>=others.length){ alert("編號不正確"); return; }
  snapshot();
  const cloned = cloneMatchupsCleared(doc.boards[others[idx]].items);
  state.items.push(...cloned);
  save(); render(); fitView();
}
function deleteDate(d){
  if(Object.keys(doc.boards).length<=1){ alert("至少要保留一個日期"); return; }
  if(!confirm(`刪除 ${d} 這天的所有對戰？`)) return;
  snapshot();
  delete doc.boards[d];
  if(doc.activeDate===d){ doc.activeDate = Object.keys(doc.boards).sort()[0]; loadActiveBoard(); }
  save(); render(); buildDateBar();
}

/* ---------------- export text summary ---------------- */
function buildExportText(){
  const lines = [];
  lines.push(`【排盤總結｜${doc.activeDate}】`);
  const matches = state.items.filter(i=>i.type==="match");
  if(!matches.length){ lines.push("（尚無對戰）"); return lines.join("\n"); }
  matches.forEach(it=>{
    normMatch(it);
    const favSide = it.hdFav, undSide = it.hdFav==="away"?"home":"away";
    const mlC = it.mlAway.lights>0 && it.mlHome.lights>0;
    const hdC = it.hdGive.lights>0 && it.hdRecv.lights>0;
    const totC= it.over.lights>0 && it.under.lights>0;
    const picks = [];
    const dots = n => "●".repeat(n);
    const pushIf = (cond,lights,label)=>{ if(cond && lights>=3) picks.push(`${label} ${dots(lights)}${lights}`); };
    pushIf(!mlC, it.mlAway.lights, `獨贏 ${it.away}`);
    pushIf(!mlC, it.mlHome.lights, `獨贏 ${it.home}`);
    pushIf(!hdC, it.hdGive.lights, `${it[favSide]}讓${it.hdVal?it.hdVal:""}`);
    pushIf(!hdC, it.hdRecv.lights, `${it[undSide]}受讓${it.hdVal?it.hdVal:""}`);
    pushIf(!totC, it.over.lights, `大分${it.totVal?it.totVal:""}`);
    pushIf(!totC, it.under.lights, `小分${it.totVal?it.totVal:""}`);
    const warns = [];
    if(mlC) warns.push("獨贏衝突"); if(hdC) warns.push("讓分衝突"); if(totC) warns.push("大小分衝突");
    if(picks.length || warns.length){
      lines.push("");
      lines.push(`${it.away} / ${it.home}`);
      picks.forEach(p=> lines.push(`  ・${p}`));
      warns.forEach(w=> lines.push(`  ⚠ ${w}`));
    }
  });
  if(lines.length<=1) lines.push("", "（沒有 3 燈以上的選擇）");
  return lines.join("\n");
}

  $("#modalText").value = buildExportText();
  $("#modal").classList.add("show");
}

};

/* ---------------- auto-layout by league ---------------- */
function leagueOf(it){
  const names = (it.type==="match") ? [it.away,it.home] : [it.team];
  for(const [k,v] of Object.entries(LEAGUES)){
    if(names.some(n=>v.teams.includes(n))) return k;
  }
  return "zz"; // unknown / custom -> last group
}
// columns per row: "auto" (by screen width) or a fixed number the user picked
function autoColsForScreen(){
  const w = (canvas && canvas.clientWidth) ? canvas.clientWidth : window.innerWidth;
  if(w < 560) return 2;     // phones
  if(w < 820) return 3;     // small tablets / landscape phones
  if(w < 1100) return 4;    // tablets / small laptops
  return 5;                 // desktop
}
// place a list of match-items into rows of `cols`, starting at cursorY, return new cursorY
const LAY = { COL_W:246, COL_GAP:24, ROW_GAP:28, GROUP_GAP:46, TOP:24, LEFT:24 };
function gridCols(n){
  if(n<=1) return 1;
  const cap = (layoutCols==="auto") ? autoColsForScreen() : layoutCols;
  return Math.min(cap, n);  // never more columns than cards
}
function placeRows(list, cols, cursorY){
  const rows = Math.ceil(list.length/cols);
  for(let r=0; r<rows; r++){
    const rowItems = list.slice(r*cols, r*cols+cols);
    let rowMaxH = 0;
    rowItems.forEach((it,c)=>{
      it.x = LAY.LEFT + c*(LAY.COL_W+LAY.COL_GAP);
      it.y = cursorY;
      const bx = itemBox(it);
      if(bx.h>rowMaxH) rowMaxH = bx.h;
    });
    cursorY += (rowMaxH || 300) + LAY.ROW_GAP;
  }
  return cursorY;
}
function autoLayout(){
  snapshot();
  const order = ["mlb","npb","kbo","cpbl","zz"];
  const groups = {}; order.forEach(k=>groups[k]=[]);
  state.items.forEach(it=>{ (groups[leagueOf(it)]||groups.zz).push(it); });
  // reset size/collapse so every card measures at its natural full height
  state.items.forEach(it=>{ if(it.type==="match"){ it.collapsed=false; } it.scale=1; });
  render(); // lay out DOM so we can measure real heights (incl. wrapped lights)
  let cursorY = LAY.TOP;
  order.forEach(k=>{
    const list = groups[k]; if(!list.length) return;
    cursorY = placeRows(list, gridCols(list.length), cursorY);
    cursorY += LAY.GROUP_GAP;
  });
  save(); render(); fitView();
}
$("#layoutBtn").onclick = ()=>{ closeMore(); autoLayout(); };

/* ---- sort by a chosen market block, conflicts sink to the bottom ---- */
function blockValue(it, which){
  // higher side of the chosen market; conflicted markets count as 0 here
  if(which==="ml")  return (it.mlAway.lights>0 && it.mlHome.lights>0) ? 0 : Math.max(it.mlAway.lights, it.mlHome.lights);
  if(which==="hd")  return (it.hdGive.lights>0 && it.hdRecv.lights>0) ? 0 : Math.max(it.hdGive.lights, it.hdRecv.lights);
  return (it.over.lights>0 && it.under.lights>0) ? 0 : Math.max(it.over.lights, it.under.lights);
}
function hasAnyConflict(it){
  const ml=it.mlAway.lights>0&&it.mlHome.lights>0, hd=it.hdGive.lights>0&&it.hdRecv.lights>0, tot=it.over.lights>0&&it.under.lights>0;
  const undS=it.hdFav==="away"?"home":"away"; const oppML=(undS==="away")?it.mlAway.lights:it.mlHome.lights;
  const cross=it.hdGive.lights>0&&oppML>0;
  return ml||hd||tot||cross;
}
function sortByBlock(which){
  closeMore();
  const order = ["mlb","npb","kbo","cpbl","zz"];
  const groups = {}; order.forEach(k=>groups[k]=[]);
  state.items.forEach(it=>{ if(it.type==="match") (groups[leagueOf(it)]||groups.zz).push(it); });
  if(!Object.values(groups).some(g=>g.length)){ alert("沒有對戰可以排序。"); return; }
  snapshot();
  state.items.forEach(it=>{ if(it.type==="match"){ it.collapsed=false; } it.scale=1; });
  render();
  // within each league: sort by chosen block value desc; conflicts (and 0s) sink to the end
  order.forEach(k=>{
    groups[k].sort((a,b)=>{
      const ca=hasAnyConflict(a)?1:0, cb=hasAnyConflict(b)?1:0;
      if(ca!==cb) return ca-cb;            // non-conflict first
      return blockValue(b,which)-blockValue(a,which); // higher lights first
    });
  });
  let cursorY = LAY.TOP;
  order.forEach(k=>{
    const list = groups[k]; if(!list.length) return;
    cursorY = placeRows(list, gridCols(list.length), cursorY);
    cursorY += LAY.GROUP_GAP;
  });
  save(); render(); fitView();
}
document.querySelectorAll("#moreMenu .sortbtn").forEach(b=>{

});

/* ---- collapse / expand all ---- */
function toggleCollapseAll(){
  closeMore();
  const matches = state.items.filter(i=>i.type==="match");
  if(!matches.length) return;
  const anyExpanded = matches.some(m=>!m.collapsed);
  snapshot();

  save(); render();
  repackColumns(false); // tidy spacing after height change
}

/* ---- repack: after a card changes height, push same-column cards down so none overlap ---- */
function repackColumns(doSave){
  // group cards by their x (column), then ensure vertical gaps >= card height + min gap
  const MIN_GAP = 18;
  const cols = {};
  state.items.forEach(it=>{ if(it.type!=="match") return; const key=Math.round(it.x); (cols[key]=cols[key]||[]).push(it); });
  let moved=false;
  Object.values(cols).forEach(list=>{
    list.sort((a,b)=>a.y-b.y);
    for(let i=1;i<list.length;i++){
      const prev=list[i-1], cur=list[i];
      const needTop = prev.y + itemBox(prev).h + MIN_GAP;
      if(cur.y < needTop){ cur.y = needTop; moved=true; }
    }
  });
  if(moved){ render(); if(doSave!==false){ save(); } }
}

/* ---------------- export PNG ---------------- */
async function exportPNG(){
  const btn = $("#pngBtn"); const orig = btn.textContent; btn.textContent="產生中…";
  try{
    const cards = [...world.querySelectorAll(".card,.token")];
    if(!cards.length){ alert("畫布上沒有東西可以匯出"); btn.textContent=orig; return; }
    // compute bounding box of all items in canvas coords
    let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
    state.items.forEach(it=>{ const b=itemBox(it); minX=Math.min(minX,it.x); minY=Math.min(minY,it.y); maxX=Math.max(maxX,it.x+b.w); maxY=Math.max(maxY,it.y+b.h); });
    const pad=30;
    const W=Math.ceil(maxX-minX+pad*2), H=Math.ceil(maxY-minY+pad*2+40);
    // Build an SVG foreignObject snapshot
    const clone = document.createElement("div");
    clone.style.cssText=`position:relative;width:${W}px;height:${H}px;background:#0c0f14;`;
    const title=document.createElement("div");
    title.textContent=`排盤板 ${doc.activeDate}`;
    title.style.cssText=`position:absolute;left:${pad}px;top:10px;color:#ffb02e;font-weight:700;font-size:16px;font-family:sans-serif;`;
    clone.appendChild(title);
    cards.forEach(c=>{
      const cc=c.cloneNode(true);
      const it=state.items.find(i=>String(i.id)===c.dataset.id);
      cc.style.left=(it.x-minX+pad)+"px"; cc.style.top=(it.y-minY+pad+40)+"px";
      clone.appendChild(cc);
    });
    document.body.appendChild(clone);
    const data = new XMLSerializer().serializeToString(wrapForeign(clone, W, H));
    document.body.removeChild(clone);
    const svgBlob = new Blob([data], {type:"image/svg+xml;charset=utf-8"});
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    // race the load against a timeout so the button never hangs (Safari may never fire onload)
    await new Promise((res,rej)=>{
      let done=false;
      const finish=(fn)=>(...a)=>{ if(done) return; done=true; fn(...a); };
      img.onload=finish(res); img.onerror=finish(()=>rej(new Error("img load failed")));
      setTimeout(finish(()=>rej(new Error("timeout"))), 4000);
      img.src=url;
    });
    const cv=document.createElement("canvas"); cv.width=W*2; cv.height=H*2;
    const ctx=cv.getContext("2d"); ctx.scale(2,2); ctx.drawImage(img,0,0);
    URL.revokeObjectURL(url);
    cv.toBlob(b=>{
      if(!b){ btn.textContent=orig; alert("圖片匯出在這個瀏覽器受限，可改用「匯出」複製文字，或直接截圖。"); return; }
      const a=document.createElement("a"); a.href=URL.createObjectURL(b);
      a.download=`排盤板_${doc.activeDate}.png`; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);
      btn.textContent=orig;
    });
  }catch(e){
    btn.textContent=orig;
    // graceful fallback: hand the user the text summary instead of a dead end
    if(typeof openExport==="function") openExport();
    else alert("這個瀏覽器不支援直接匯出圖片，已改用文字匯出，或請直接截圖。");
  }
}
function wrapForeign(node, W, H){
  const svgNS="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(svgNS,"svg");
  svg.setAttribute("xmlns",svgNS); svg.setAttribute("width",W); svg.setAttribute("height",H);
  const fo=document.createElementNS(svgNS,"foreignObject");
  fo.setAttribute("width",W); fo.setAttribute("height",H);
  const wrap=document.createElement("div"); wrap.setAttribute("xmlns","http://www.w3.org/1999/xhtml");
  wrap.appendChild(node); fo.appendChild(wrap); svg.appendChild(fo);
  return svg;
}

function isMobileLayout(){ return (canvas?.clientWidth||window.innerWidth) < 760; }
function teamsForToday(league){
  // teams appearing on the current board for the given league
  const set = new Set();
  state.items.forEach(it=>{
    if(it.type!=="match") return;
    const lg = leagueOf(it);
    if(lg!==league) return;
    set.add(it.away); set.add(it.home);
  });
  return set;
}
function openStatsPage(){
  closeMore();
  const sp = $("#statspage"); if(!sp) return;
  // populate season selector (years from 2026 onwards, up to current year+1)
  const sel = $("#statsSeason");
  if(sel && !sel.dataset.built){
    const thisYear = new Date().getFullYear();
    const years = [];
