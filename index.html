// stats sort state: which column to sort by, ascending or descending
let statsSort = { market:null, venue:null, dir:"desc" };  // null = default league order
function teamPctForSort(season, team, market, venue){
  const rec = statRead(season, team, market, venue);
  const d = (rec.w||0)+(rec.l||0);
  if(d===0) return null;
  return rec.w/d;
}
function sortedTeams(teams, season){
  if(!statsSort.market) return teams;
  return [...teams].sort((a,b)=>{
    const pa = teamPctForSort(season,a,statsSort.market,statsSort.venue);
    const pb = teamPctForSort(season,b,statsSort.market,statsSort.venue);
    if(pa==null && pb==null) return 0;
    if(pa==null) return 1;
    if(pb==null) return -1;
    return statsSort.dir==="desc" ? pb-pa : pa-pb;
  });
}
function setSort(market, venue){
  if(statsSort.market===market && statsSort.venue===venue){
    if(statsSort.dir==="desc") statsSort.dir="asc";
    else { statsSort = { market:null, venue:null, dir:"desc" }; }
  } else {
    statsSort = { market, venue, dir:"desc" };
  }
  renderStatsPage();
}
function sortIndicator(market, venue){
  if(statsSort.market!==market || statsSort.venue!==venue) return "";
  return statsSort.dir==="desc" ? " ▼" : " ▲";
}

// add or subtract the effect of a settlement on stats (delta = +1 or -1)
// picks._sid is a stable settlement-id used to tag/untag recent entries
function applySettlement(it, picks, delta){
  const season = seasonOf(doc.activeDate);
  // venues: away team is "away", home team is "home"
  const awayV = "away", homeV = "home";
  // 獨贏
  if(picks.ml==="away"){ statAdd(season, it.away, "ml", awayV, "w", delta); statAdd(season, it.home, "ml", homeV, "l", delta); }
  else if(picks.ml==="home"){ statAdd(season, it.home, "ml", homeV, "w", delta); statAdd(season, it.away, "ml", awayV, "l", delta); }
  else if(picks.ml==="tie"){ statAdd(season, it.away, "ml", awayV, "t", delta); statAdd(season, it.home, "ml", homeV, "t", delta); }
  // 讓分／受讓
  const fav = it.hdFav==="away" ? it.away : it.home;
  const und = it.hdFav==="away" ? it.home : it.away;
  const favV = it.hdFav==="away" ? awayV : homeV;
  const undV = it.hdFav==="away" ? homeV : awayV;
  if(picks.hd==="cover"){
    statAdd(season, fav, "hd",   favV, "w", delta);
    statAdd(season, und, "recv", undV, "l", delta);
  } else if(picks.hd==="nocover"){
    statAdd(season, fav, "hd",   favV, "l", delta);
    statAdd(season, und, "recv", undV, "w", delta);
  }
  // 大小分: both teams get the same result on their venue
  if(picks.tot==="over"){
    statAdd(season, it.away, "tot", awayV, "w", delta);
    statAdd(season, it.home, "tot", homeV, "w", delta);
  } else if(picks.tot==="under"){
    statAdd(season, it.away, "tot", awayV, "l", delta);
    statAdd(season, it.home, "tot", homeV, "l", delta);
  }
  // "recent" list: each settlement carries a unique sid; +1 adds tagged entries, -1 removes them.
  const sid = picks._sid;
  if(delta>0 && sid){
    // forward: append tagged entries
    if(picks.ml==="away"){ recentAdd({sid, team:it.away, market:"ml", venue:awayV, result:"w", date:doc.activeDate}); recentAdd({sid, team:it.home, market:"ml", venue:homeV, result:"l", date:doc.activeDate}); }
    else if(picks.ml==="home"){ recentAdd({sid, team:it.home, market:"ml", venue:homeV, result:"w", date:doc.activeDate}); recentAdd({sid, team:it.away, market:"ml", venue:awayV, result:"l", date:doc.activeDate}); }
    else if(picks.ml==="tie"){ recentAdd({sid, team:it.away, market:"ml", venue:awayV, result:"t", date:doc.activeDate}); recentAdd({sid, team:it.home, market:"ml", venue:homeV, result:"t", date:doc.activeDate}); }
    if(picks.hd==="cover"){
      recentAdd({sid, team:fav, market:"hd", venue:favV, result:"w", date:doc.activeDate});
      recentAdd({sid, team:und, market:"recv", venue:undV, result:"l", date:doc.activeDate});
    } else if(picks.hd==="nocover"){
      recentAdd({sid, team:fav, market:"hd", venue:favV, result:"l", date:doc.activeDate});
      recentAdd({sid, team:und, market:"recv", venue:undV, result:"w", date:doc.activeDate});
    }
    if(picks.tot==="over"){
      recentAdd({sid, team:it.away, market:"tot", venue:awayV, result:"w", date:doc.activeDate});
      recentAdd({sid, team:it.home, market:"tot", venue:homeV, result:"w", date:doc.activeDate});
    } else if(picks.tot==="under"){
      recentAdd({sid, team:it.away, market:"tot", venue:awayV, result:"l", date:doc.activeDate});
      recentAdd({sid, team:it.home, market:"tot", venue:homeV, result:"l", date:doc.activeDate});
    }
  } else if(delta<0 && sid){
    // reverse: drop every recent entry tagged with this sid
    if(doc.recent && doc.recent.length){
      doc.recent = doc.recent.filter(r=> r.sid !== sid);
    }
  }
}

/* ============================================================
   COVERAGE RATE on cards — small text on section header, both teams
   ============================================================ */
const SAMPLE_MIN = 15;       // < 15 samples -> grey/uncertain
const SAMPLE_TREND = 20;     // < 20 -> excluded from "綜合傾向"

// shorten team name to its first 1-2 distinctive chars for mobile
function abbrev(team){
  if(!team) return team;
  // Common patterns: 2-char prefixes for compound English-ish names (LG雙子→LG, NC恐龍→NC, SSG登陸者→SSG)
  // For Chinese names just use the first character
  const m = team.match(/^([A-Za-z]+)/);
  if(m) return m[1];
  return team.charAt(0);
}

function pctForCard(team, market, venue){
  // honors user's pctWindow preference (season / 10 / 30 / 50)
  if(pctWindow==="season"){
    return statRead(seasonOf(doc.activeDate), team, market, venue);
  } else {
    const n = parseInt(pctWindow,10)||30;
    const rec = recentRead(team, market, venue, n);
    if(rec) return rec;
    return statRead(seasonOf(doc.activeDate), team, market, venue);
  }
}
// Returns { pct, pn, sample, low, hi } or null if no data at all
function pctInfo(team, market, venue){
  const rec = pctForCard(team, market, venue);
  const sample = (rec.w||0)+(rec.l||0);   // ties excluded from denom
  if(sample===0) return null;
  const pn = rec.w/sample;
  return {
    pct: Math.round(pn*100)+"%",
    pn, sample,
    lowSample: sample < SAMPLE_MIN,
    cls: pn>=0.55 ? "hi" : (pn<0.40 ? "lo" : "")
  };
}
// Render one team's pct chunk; uses short name on mobile
function fmtPctChunk(team, label, info){
  if(!info) return null;
  const mobile = isMobileLayout();
  const name = mobile ? abbrev(team) : team;
  const cls = info.lowSample ? "low-sample" : info.cls;
  const sampleTag = info.lowSample ? `<span class="ssize">(${info.sample})</span>` : "";
  return `<span class="ck">${esc(name)}${label||""} <span class="v ${cls}">${info.pct}</span>${sampleTag}</span>`;
}
// Build the pctline HTML for a section. `which` = "ml" | "hd" | "recv" | "tot"
// Plan A: show both teams in every section.
function sectionPctHTML(it, which){
  const awayV="away", homeV="home";
  const favSide = it.hdFav, undSide = favSide==="away"?"home":"away";
  const favName = it[favSide], undName = it[undSide];
  const favV = favSide==="away"?awayV:homeV;
  const undV = undSide==="away"?awayV:homeV;
  const parts = [];
  if(which==="ml"){
    parts.push(fmtPctChunk(it.away, "", pctInfo(it.away,"ml",awayV)));
    parts.push(fmtPctChunk(it.home, "", pctInfo(it.home,"ml",homeV)));
  } else if(which==="hd"){
    // Plan A: show both — favorite's 讓 rate AND opponent's 受讓 rate, in same line
    parts.push(fmtPctChunk(favName, " 讓", pctInfo(favName,"hd",favV)));
    parts.push(fmtPctChunk(undName, " 受讓", pctInfo(undName,"recv",undV)));
  } else if(which==="tot"){
    // both teams' "大分過盤率" on their respective venues
    parts.push(fmtPctChunk(it.away, " 大", pctInfo(it.away,"tot",awayV)));
    parts.push(fmtPctChunk(it.home, " 大", pctInfo(it.home,"tot",homeV)));
  }
  const filt = parts.filter(Boolean);
  return filt.length ? `<span class="pctline">${filt.join(" / ")}</span>` : "";
}

/* ============================================================
   "綜合數據傾向" — each bet option judged independently against threshold
   ============================================================ */
// User-adjustable threshold. UP = lower bound for "favorable" (>= UP).
// DOWN = upper bound for "unfavorable" (<= DOWN). Symmetric around 50%.
const SAMPLE_TREND_MIN = 15;      // matches the same threshold used elsewhere

// Collect all bet options that meet the favorable threshold on this match.
function trendForMatch(it){
  const awayV="away", homeV="home";
  const favSide = it.hdFav, undSide = favSide==="away"?"home":"away";
  const fav = it[favSide], und = it[undSide];
  const favV = favSide==="away"?awayV:homeV;
  const undV = undSide==="away"?awayV:homeV;
  const UP = trendThreshold;
  const DOWN = 1 - trendThreshold;   // e.g. 0.55 -> 0.45

  // raw stat lookups (ignore lowSample flag here, we apply sample gate ourselves)
  function rawPct(team, market, venue){
    const rec = pctForCard(team, market, venue);
    const s = (rec.w||0)+(rec.l||0);
    if(s < SAMPLE_TREND_MIN) return null;
    return { pn: rec.w/s, sample: s };
  }

  const out = [];
  // Each team's moneyline judged independently
  const aML = rawPct(it.away, "ml", awayV);
  const hML = rawPct(it.home, "ml", homeV);
  if(aML && aML.pn >= UP) out.push({ label:`${it.away}獨贏`, pn:aML.pn, sample:aML.sample });
  if(hML && hML.pn >= UP) out.push({ label:`${it.home}獨贏`, pn:hML.pn, sample:hML.sample });

  // Handicap & receive judged independently from their own track record
  const favHD  = rawPct(fav, "hd",   favV);
  const undREC = rawPct(und, "recv", undV);
  if(favHD  && favHD.pn  >= UP) out.push({ label:`${fav}讓分`, pn:favHD.pn,  sample:favHD.sample  });
  if(undREC && undREC.pn >= UP) out.push({ label:`${und}受讓`, pn:undREC.pn, sample:undREC.sample });

  // 大／小分: total is shared — judge by AVERAGE of both teams' 大分 rate on their venues
  const aTOT = rawPct(it.away, "tot", awayV);
  const hTOT = rawPct(it.home, "tot", homeV);
  if(aTOT && hTOT){
    const avg = (aTOT.pn + hTOT.pn)/2;
    const minSample = Math.min(aTOT.sample, hTOT.sample);
    if(avg >= UP)        out.push({ label:"大分", pn:avg, sample:minSample });
    else if(avg <= DOWN) out.push({ label:"小分", pn:1-avg, sample:minSample });
    // ↑ for 小分 we flip the rate so larger = stronger小分 signal (presented as 1-avg)
  }

  // sort: most "favorable" first
  out.sort((a,b)=> b.pn - a.pn);
  return out;
}
function trendHTML(it){
  const list = trendForMatch(it);
  if(!list.length) return "";
  const rows = list.map(t=>{
    const pct = Math.round(t.pn*100)+"%";
    const strong = t.pn >= trendThreshold + 0.10;   // notably above threshold
    const cls = strong ? "strong" : "";
    return `<div class="trow ${cls}">· <b>${esc(t.label)}</b> <span class="td">${pct}</span></div>`;
  }).join("");
  return `<div class="trendline"><div class="thd">📊 數據偏向</div>${rows}</div>`;
}

/* Per-option dampening: a lit-up market WHOSE chosen side has a low cover rate
   (and enough samples) should not light up the strong frame on the card.
   Also reused by the summary panel to flag entries as "⚠ 過盤率低". */
function isLitSideLow(it, market){
  const awayV="away", homeV="home";
  const favSide = it.hdFav, undSide = favSide==="away"?"home":"away";
  const fav = it[favSide], und = it[undSide];
  const favV = favSide==="away"?awayV:homeV;
  const undV = undSide==="away"?awayV:homeV;
  const DOWN = 1 - trendThreshold;
  function low(team, mkt, venue, lights){
    if(lights<3) return false;
    const info = pctInfo(team, mkt, venue);
    if(!info || info.lowSample) return false;
    return info.pn < DOWN;
  }
  if(market==="ml"){
    return low(it.away,"ml",awayV,it.mlAway.lights) || low(it.home,"ml",homeV,it.mlHome.lights);
  } else if(market==="hd"){
    return low(fav,"hd",favV,it.hdGive.lights);
  } else if(market==="recv"){
    return low(und,"recv",undV,it.hdRecv.lights);
  } else if(market==="tot"){
    // for totals: average both teams' 大分 rate against the chosen side
    const aT = pctInfo(it.away,"tot",awayV);
    const hT = pctInfo(it.home,"tot",homeV);
    if(!aT || !hT || aT.lowSample || hT.lowSample) return false;
    const avg = (aT.pn + hT.pn)/2;
    if(it.over.lights>=3  && avg < DOWN) return true;
    if(it.under.lights>=3 && avg > trendThreshold) return true;
    return false;
  }
  return false;
}

function strongShouldBeDampened(it){
  // a card with 3+ lights and ANY lit market whose chosen side has a low cover rate
  return isLitSideLow(it,"ml") || isLitSideLow(it,"hd") || isLitSideLow(it,"recv") || isLitSideLow(it,"tot");
}

/* "pct window" selector in menu (existing winbtn / data-win) */
document.querySelectorAll("#moreMenu .winbtn").forEach(b=>{
  b.onclick = (e)=>{
    e.stopPropagation();
    pctWindow = (b.dataset.win==="season") ? "season" : parseInt(b.dataset.win,10);
    refreshPctBtns(); save(); render();
  };
});
function refreshPctBtns(){
  document.querySelectorAll("#moreMenu .winbtn").forEach(b=>{
    b.classList.toggle("on", String(pctWindow)===b.dataset.win);
  });
}

/* "threshold" selector for trend & dampening (55/60/65) */
document.querySelectorAll("#moreMenu .thrbtn").forEach(b=>{
  b.onclick = (e)=>{
    e.stopPropagation();
    trendThreshold = parseFloat(b.dataset.thr);
    refreshThrBtns(); save(); render();
  };
});
function refreshThrBtns(){
  document.querySelectorAll("#moreMenu .thrbtn").forEach(b=>{
    b.classList.toggle("on", Math.abs(parseFloat(b.dataset.thr)-trendThreshold)<0.005);
  });
}

  buildTray(); buildDateBar(); render(); updateUndoBtn(); refreshColBtns(); refreshPctBtns(); refreshThrBtns();
